// ── Generic Picker Modal ─────────────────────────────────────────────
function showPicker(title, items, onPick) {
  // items: [{icon, label, sub, value}]
  const overlay = document.getElementById('picker-overlay');
  document.getElementById('picker-title').textContent = title;
  const search  = document.getElementById('picker-search');
  const list    = document.getElementById('picker-list');
  search.value  = '';

  function renderList(filter) {
    list.innerHTML = '';
    const f = filter.toLowerCase();
    let shown = 0;
    items.forEach(item => {
      if (f && !item.label.toLowerCase().includes(f) && !String(item.sub||'').toLowerCase().includes(f)) return;
      const d = document.createElement('div');
      d.className = 'picker-item';
      d.innerHTML = `<span>${item.icon||'📦'}</span><span class="pi-tag">${item.tag||''}</span><span style="flex:1">${item.label}</span><span class="pi-sub">${item.sub||''}</span>`;
      d.addEventListener('click', () => { close(); onPick(item.value); });
      list.appendChild(d);
      shown++;
    });
    if (!shown) { const e = document.createElement('div'); e.className='no-items'; e.textContent='Nothing found'; list.appendChild(e); }
  }

  renderList('');
  search.oninput = e => renderList(e.target.value);

  const close = () => { overlay.classList.remove('active'); search.oninput = null; };
  document.getElementById('picker-cancel').onclick = close;
  overlay.onclick = e => { if (e.target === overlay) close(); };
  overlay.classList.add('active');
  setTimeout(() => search.focus(), 50);
}

// ── Generic Form Modal ───────────────────────────────────────────────
// fields: [{id, label, type:'text'|'select'|'hex', options, value, hint, placeholder}]
function showForm(title, submitLabel, fields, onSubmit) {
  const overlay = document.getElementById('form-overlay');
  document.getElementById('form-title').textContent = title;
  document.getElementById('form-submit').textContent = submitLabel || '✚ Create';

  const container = document.getElementById('form-fields');
  container.innerHTML = '';
  const inputs = {};

  fields.forEach(f => {
    if (f.type === 'sep') {
      container.appendChild(document.createElement('div')).className = 'form-sep';
      return;
    }
    const wrap = document.createElement('div');
    wrap.className = 'form-field';
    const lbl = document.createElement('label');
    lbl.textContent = f.label;
    wrap.appendChild(lbl);

    if (f.type === 'select') {
      const sel = document.createElement('select');
      sel.className = 'form-select form-input';
      (f.options||[]).forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value; o.textContent = opt.label;
        if (opt.value === f.value) o.selected = true;
        sel.appendChild(o);
      });
      wrap.appendChild(sel);
      inputs[f.id] = () => sel.value;
    } else if (f.type === 'chunk-pick') {
      // text + button to open picker
      const row = document.createElement('div');
      row.className = 'form-input-row';
      const inp = document.createElement('input');
      inp.className = 'form-input'; inp.type = 'text';
      inp.value = f.value || ''; inp.placeholder = f.placeholder || '';
      inp.readOnly = true; inp.style.cursor = 'pointer';
      const btn = document.createElement('button');
      btn.className = 'btn btn-action btn-add'; btn.textContent = '🔍 Pick';
      btn.style.padding = '4px 10px';
      btn.type = 'button';
      btn.onclick = () => showPicker(f.pickerTitle||'Select', f.pickerItems||[], val => {
        inp.value = val.display; inp._pickedValue = val.idx;
      });
      row.appendChild(inp); row.appendChild(btn);
      wrap.appendChild(row);
      inputs[f.id] = () => inp._pickedValue !== undefined ? inp._pickedValue : null;
    } else {
      const inp = document.createElement('input');
      inp.className = 'form-input'; inp.type = 'text';
      inp.value = f.value || ''; inp.placeholder = f.placeholder || '';
      wrap.appendChild(inp);
      inputs[f.id] = () => inp.value;
    }

    if (f.hint) {
      const h = document.createElement('div');
      h.className = 'form-hint'; h.textContent = f.hint;
      wrap.appendChild(h);
    }
    container.appendChild(wrap);
  });

  const close = () => overlay.classList.remove('active');
  document.getElementById('form-cancel').onclick = close;
  overlay.onclick = e => { if (e.target === overlay) close(); };

  document.getElementById('form-submit').onclick = () => {
    const vals = {};
    for (const [k, getter] of Object.entries(inputs)) vals[k] = getter();
    if (onSubmit(vals) !== false) close();
  };

  overlay.classList.add('active');
  // Focus first text input
  const firstInp = container.querySelector('input[type=text]:not([readonly])');
  if (firstInp) setTimeout(() => firstInp.focus(), 50);
}

// ── Deep clone fields object ─────────────────────────────────────────
function deepCloneFields(fields) {
  if (!fields) return null;
  return JSON.parse(JSON.stringify(fields));
}

// ── Get a safe default FourCC for a type ────────────────────────────
function getDefaultFourCC(type) {
  // Prefer copying from an existing chunk so we don't guess
  if (state.jazz) {
    const ex = state.jazz.chunks.find(c => c.type === type);
    if (ex) return ex.fourcc;
  }
  const map = {
    0x02d5df13: 'S_SM', 0x02eedafe: 'S_St', 0x02eedb18: 'S_DG',
    0x02eedb2f: 'S_AD', 0x02eedb46: 'S_PD',
    0x02eedb5f: 'Play', 0x0344d438: 'Stop', 0x02eedb70: 'Rand',
    0x02eeebdd: 'Prop', 0x02eeebdc: 'NxSt', 0x02eeebde: 'AcOp',
  };
  return map[type] || '????';
}

function getDefaultChunkVer(type) {
  if (state.jazz) {
    const ex = state.jazz.chunks.find(c => c.type === type);
    if (ex) return ex.chunkVer;
  }
  const map = {
    0x02d5df13: 0x202, 0x02eedafe: 0x101, 0x02eedb18: 0x101,
    0x02eedb2f: 0x100, 0x02eedb5f: 0x105, 0x0344d438: 0x104,
    0x02eedb70: 0x101, 0x02eeebdd: 0x100, 0x02eeebdc: 0x101,
  };
  return map[type] || 0x100;
}

// ── Low-level chunk factory ───────────────────────────────────────────
function appendChunk(type, fields) {
  const newIdx = state.jazz.chunks.length;
  const chunk = {
    index:    newIdx,
    type,
    typeName: CHUNK_TYPES[type] || 'Unknown',
    fourcc:   getDefaultFourCC(type),
    chunkVer: getDefaultChunkVer(type),
    instance: { lo: 0, hi: 0 },
    group:    0,
    rawData:  new Uint8Array(0),
    fields,
    modified: true,
    isNew:    true,
  };
  state.jazz.chunks.push(chunk);
  state.jazz.count++;
  return newIdx;
}

// ── Clone an existing chunk ───────────────────────────────────────────
function cloneChunk(srcIdx) {
  const src = state.jazz.chunks[srcIdx];
  const newIdx = state.jazz.chunks.length;
  const cloned = {
    index:    newIdx,
    type:     src.type,
    typeName: src.typeName,
    fourcc:   src.fourcc,
    chunkVer: src.chunkVer,
    instance: { lo: 0, hi: 0 },
    group:    src.group,
    rawData:  new Uint8Array(src.rawData), // byte-for-byte copy
    fields:   deepCloneFields(src.fields),
    modified: true,
    isNew:    true,
  };
  state.jazz.chunks.push(cloned);
  state.jazz.count++;
  return newIdx;
}

// ── Create DecisionGraph chunk ─────────────────────────────────────
function createDGChunk() {
  return appendChunk(0x02eedb18, {
    unknowns: [0], allNodes: [], graphRoot: [], sentinel: 0xDEADBEEF,
  });
}

// ── Create State chunk (with new empty DG) ────────────────────────
function createStateWithDG(nameHash) {
  const dgIdx    = createDGChunk();
  const stateIdx = appendChunk(0x02eedafe, {
    stateName: nameHash, stateProperties: 0,
    dgIndex: dgIdx, transitions: [], unknowns: [6],
  });
  return { stateIdx, dgIdx };
}

// ── Create Play Animation chunk (defaults) ─────────────────────────
function createPlayChunk(clipInstanceHex) {
  const clipLo = parseInt(clipInstanceHex.slice(-8), 16) || 0;
  const clipHi = parseInt(clipInstanceHex.slice(0, -8) || '0', 16) || 0;
  return appendChunk(0x02eedb5f, {
    clip: { instance: {lo: clipLo, hi: clipHi}, type: 0x6b20c4f3, group: 0 },
    tkMk: { instance: {lo: 0, hi: 0}, type: 0x033260e3, group: 0 },
    g1Count: 0, playUnk: [0, 0, 0], group1: [], group2: [],
    sentinel1: 0xDEADBEEF, playUnk2: [0, 0, 0, 0], strData: '',
    playUnk3: [0], sentinel2: 0xDEADBEEF,
    flags: 1, priority: 10000, animUnk1: [0], blendIn: 0.0,
    animUnk2: [0x3f800000, 0x41800000, 0], // 1.0, 16.0, 0
    actorIdx: null, priority2: 10000,
    animUnk3: [0, 0, 0, 0, 0, 0],
    sentinel3: 0xDEADBEEF, actions: [],
  });
}

// ── Create Stop chunk (defaults) ──────────────────────────────────
function createStopChunk() {
  return appendChunk(0x0344d438, {
    flags: 1, priority: 10000, animUnk1: [0], blendIn: 0.0,
    animUnk2: [0x3f800000, 0x41800000, 0],
    actorIdx: null, priority2: 10000,
    animUnk3: [0, 0, 0, 0, 0, 0],
    sentinel: 0xDEADBEEF, actions: [],
  });
}

// ── Create Random chunk (defaults) ────────────────────────────────
function createRandomChunk() {
  return appendChunk(0x02eedb70, {
    choices: [], sentinel: 0xDEADBEEF, flags: 0,
  });
}

// ── ADD STATE to StateMachine ─────────────────────────────────────
function uiAddStateToSM() {
  showForm('➕ Add New State', '✚ Create State', [
    {
      id: 'name', label: 'State Name Hash (hex)',
      type: 'text', value: '0x00000000',
      placeholder: '0x12345678',
      hint: 'uint32 hash of the state name (e.g. 0x42E0CFBC)',
    },
    { type: 'sep' },
    {
      id: 'props', label: 'State Properties (hex)',
      type: 'text', value: '0x00000000',
      placeholder: '0x00000105',
      hint: 'Flags: bit0=Loop bit1=Persistent bit2=Entry bit3=Exit',
    },
  ], vals => {
    const nameHash = parseHex(vals.name);
    if (nameHash === null) { alert('Invalid Name Hash'); return false; }
    const props = parseHex(vals.props) || 0;

    const { stateIdx, dgIdx } = createStateWithDG(nameHash);
    state.jazz.chunks[stateIdx].fields.stateProperties = props;

    // Add to StateMachine states list
    const sm = state.jazz.chunks[0];
    if (sm && sm.fields) {
      sm.fields.states.push(stateIdx);
      sm.modified = true;
    }

    treeExpanded.add(0); treeExpanded.add(stateIdx);
    state.selIdx = stateIdx;
    notify(`Created State ${h8(nameHash)} (#${stateIdx}) with DG #${dgIdx}`);
    renderTree(); renderProps();
  });
}

// ── ADD TRANSITION to State ───────────────────────────────────────
function uiAddTransition(stateChunk) {
  const allStates = state.jazz.chunks
    .filter(c => c.type === 0x02eedafe && c !== stateChunk)
    .map(c => ({
      icon: '📌',
      tag:  h8(c.fields?.stateName || 0),
      label: `State ${h8(c.fields?.stateName || 0)}`,
      sub:  `#${c.index}`,
      value: c.index,
    }));

  if (!allStates.length) { notify('No other states in file'); return; }

  showPicker('➕ Add Transition → select target State', allStates, targetIdx => {
    // Check not already there
    if (stateChunk.fields.transitions.includes(targetIdx)) {
      notify('Transition already exists'); return;
    }
    stateChunk.fields.transitions.push(targetIdx);
    stateChunk.modified = true;
    const tgt = state.jazz.chunks[targetIdx];
    notify(`Added transition → State ${h8(tgt?.fields?.stateName || 0)}`);
    renderTree(); renderProps();
  });
}

// ── ADD NODE to DecisionGraph ─────────────────────────────────────
function uiAddNodeToDG(dgChunk) {
  // Build options: create new types + clone existing action nodes
  const items = [];

  // "Create new" options
  items.push({ icon: '▶', tag: 'NEW', label: 'New Play Animation node', sub: 'enter clip hash', value: { action: 'new-play' } });
  items.push({ icon: '⏹', tag: 'NEW', label: 'New Stop Animation node', sub: 'default values', value: { action: 'new-stop' } });
  items.push({ icon: '🎲', tag: 'NEW', label: 'New Random node', sub: 'empty choices', value: { action: 'new-random' } });

  // Clone existing action nodes
  const actionTypes = [0x02eedb5f, 0x0344d438, 0x02eedb70, 0x02eeebdd, 0x02eeebdc, 0x02eeebde];
  state.jazz.chunks.forEach(c => {
    if (!actionTypes.includes(c.type)) return;
    const icon = CHUNK_ICONS[c.typeName] || '📦';
    let sub = `#${c.index}`;
    if (c.type === 0x02eedb5f && c.fields?.clip)
      sub += `  clip:${h64(c.fields.clip.instance.lo, c.fields.clip.instance.hi)}`;
    items.push({ icon, tag: 'CLONE', label: c.typeName, sub, value: { action: 'clone', srcIdx: c.index } });
  });

  showPicker('➕ Add node to DecisionGraph', items, picked => {
    let newIdx = null;

    if (picked.action === 'new-stop') {
      newIdx = createStopChunk();
      finishAddNodeToDG(dgChunk, newIdx);
      return;
    }
    if (picked.action === 'new-random') {
      newIdx = createRandomChunk();
      finishAddNodeToDG(dgChunk, newIdx);
      return;
    }
    if (picked.action === 'clone') {
      newIdx = cloneChunk(picked.srcIdx);
      finishAddNodeToDG(dgChunk, newIdx);
      return;
    }
    if (picked.action === 'new-play') {
      // Show form to fill clip hash
      const existingPlays = state.jazz.chunks
        .filter(c => c.type === 0x02eedb5f)
        .map(c => ({
          icon: '▶',
          tag:  h64(c.fields?.clip?.instance?.lo||0, c.fields?.clip?.instance?.hi||0),
          label: `PlayAnimation #${c.index}`,
          sub:   h64(c.fields?.clip?.instance?.lo||0, c.fields?.clip?.instance?.hi||0),
          value: { display: h64(c.fields?.clip?.instance?.lo||0, c.fields?.clip?.instance?.hi||0), idx: null, clipHex: h64(c.fields?.clip?.instance?.lo||0, c.fields?.clip?.instance?.hi||0) },
        }));

      showForm('▶ New Play Animation', '✚ Create', [
        {
          id: 'clip', label: 'Clip Instance Hash (hex)',
          type: 'text', value: '0x0000000000000000',
          placeholder: '0x1234567890ABCDEF',
          hint: 'The animation clip resource instance hash',
        },
        existingPlays.length ? {
          id: 'copyFrom', label: 'Or copy clip from existing Play node',
          type: 'chunk-pick',
          pickerTitle: 'Pick existing Play node to copy clip from',
          pickerItems: existingPlays,
          placeholder: 'Click 🔍 to pick...',
        } : null,
        { type: 'sep' },
        {
          id: 'actorPick', label: 'Actor (optional)',
          type: 'chunk-pick',
          pickerTitle: 'Pick ActorDefinition',
          pickerItems: state.jazz.chunks
            .filter(c => c.type === 0x02eedb2f)
            .map(c => ({
              icon: '🎪', tag: h8(c.fields?.parameterName||0),
              label: `ActorDef ${h8(c.fields?.parameterName||0)}`,
              sub: `#${c.index}`,
              value: { display: `ActorDef #${c.index}`, idx: c.index },
            })),
          placeholder: 'Click 🔍 to pick (optional)...',
        },
      ].filter(Boolean), vals => {
        let clipHex = (vals.copyFrom != null)
          ? existingPlays.find(p => p.value.idx === vals.copyFrom)?.value.clipHex || vals.clip
          : vals.clip;
        // Normalize: strip 0x, pad to 16
        clipHex = clipHex.replace(/^0x/i,'').padStart(16,'0');
        newIdx = createPlayChunk(clipHex);
        if (vals.actorPick !== null && vals.actorPick !== undefined)
          state.jazz.chunks[newIdx].fields.actorIdx = vals.actorPick;
        finishAddNodeToDG(dgChunk, newIdx);
      });
    }
  });
}

function finishAddNodeToDG(dgChunk, newIdx) {
  const newChunk = state.jazz.chunks[newIdx];
  dgChunk.fields.allNodes.push(newIdx);
  dgChunk.fields.graphRoot.push(newIdx);
  dgChunk.modified = true;
  treeExpanded.add(dgChunk.index);
  state.selIdx = newIdx;
  notify(`Added ${newChunk.typeName} #${newIdx} to DecisionGraph`);
  renderTree(); renderProps();
}


// ═══════════════════════════════════════════════════════
// SORTABLE LIST (drag-to-reorder)
// ═══════════════════════════════════════════════════════
// arr      : the live array to mutate on reorder
// items    : [{icon, label, sub, onNav, onDelete, onMove}]
// onChange : called after every reorder
function makeSortableList(arr, items, onChange) {
  const list = document.createElement('div');
  list.className = 'sortable-list';

  function build() {
    list.innerHTML = '';
    items.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'sortable-item';
      row.draggable = true;
      row.dataset.i = i;

      const grip = document.createElement('span');
      grip.className = 'sort-grip'; grip.textContent = '⠿';
      const ico  = document.createElement('span');
      ico.className = 'sort-icon'; ico.textContent = item.icon || '📦';
      const lbl  = document.createElement('span');
      lbl.className = 'sort-label'; lbl.textContent = item.label;
      const sub  = document.createElement('span');
      sub.className = 'sort-sub'; sub.textContent = item.sub || '';

      row.appendChild(grip); row.appendChild(ico);
      row.appendChild(lbl); row.appendChild(sub);

      // Click to navigate
      if (item.onNav) {
        lbl.style.cursor = 'pointer';
        lbl.style.color = 'var(--accent)';
        lbl.addEventListener('click', e => { e.stopPropagation(); item.onNav(); });
      }

      // Move to other DG button
      if (item.onMove) {
        const mv = document.createElement('span');
        mv.className = 'sort-btn-move'; mv.textContent = '→DG'; mv.title = 'Move to another DecisionGraph';
        mv.addEventListener('click', e => { e.stopPropagation(); item.onMove(); });
        row.appendChild(mv);
      }

      // Delete button
      if (item.onDelete) {
        const del = document.createElement('span');
        del.className = 'sort-btn-del'; del.textContent = '✕'; del.title = 'Remove / delete';
        del.addEventListener('click', e => { e.stopPropagation(); item.onDelete(); });
        row.appendChild(del);
      }

      // Drag events
      row.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', i);
        row.classList.add('dragging');
      });
      row.addEventListener('dragend', () => row.classList.remove('dragging'));
      row.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        const to   = parseInt(row.dataset.i);
        if (from === to) return;
        // Mutate the live array
        const [moved] = arr.splice(from, 1);
        arr.splice(to, 0, moved);
        // Rebuild item list to reflect new order
        const [movedItem] = items.splice(from, 1);
        items.splice(to, 0, movedItem);
        items.forEach((it, idx) => it._idx = idx);
        if (onChange) onChange();
        build();
      });

      list.appendChild(row);
    });
  }
  build();
  return list;
}

// ═══════════════════════════════════════════════════════
// ASSIGN EXISTING CHUNK TO DG (Feature 5)
// ═══════════════════════════════════════════════════════
function uiAssignChunkToDG(dgChunk) {
  const actionTypes = [0x02eedb5f, 0x0344d438, 0x02eedb70, 0x02eeebdd, 0x02eeebdc, 0x02eeebde, 0x02eedb92];
  const existing = new Set(dgChunk.fields.allNodes.filter(i => i !== null));

  const items = state.jazz.chunks
    .filter(c => actionTypes.includes(c.type) && !existing.has(c.index))
    .map(c => {
      const icon = CHUNK_ICONS[c.typeName] || '📦';
      let sub = `#${c.index}`;
      if (c.type === 0x02eedb5f && c.fields?.clip)
        sub += '  ' + h64(c.fields.clip.instance.lo, c.fields.clip.instance.hi);
      return { icon, tag: c.typeName, label: c.typeName, sub, value: c.index };
    });

  if (!items.length) { notify('No assignable chunks available (all already in this DG)'); return; }

  showPicker('📎 Assign existing chunk to DG', items, idx => {
    // Add to allNodes & graphRoot (if not already a root)
    if (!dgChunk.fields.allNodes.includes(idx)) dgChunk.fields.allNodes.push(idx);
    if (!dgChunk.fields.graphRoot.includes(idx)) dgChunk.fields.graphRoot.push(idx);
    dgChunk.modified = true;
    notify(`Assigned chunk #${idx} to DecisionGraph`);
    treeExpanded.add(dgChunk.index);
    state.selIdx = dgChunk.index;
    renderTree(); renderProps();
  });
}

// ═══════════════════════════════════════════════════════
// MOVE NODE TO ANOTHER DG (Feature 6)
// ═══════════════════════════════════════════════════════
function uiMoveNodeToDG(srcDGChunk, nodeIdx) {
  const items = state.jazz.chunks
    .filter(c => c.type === 0x02eedb18 && c !== srcDGChunk)
    .map(c => ({
      icon: '🔀', tag: `#${c.index}`,
      label: `DecisionGraph #${c.index}`,
      sub: `${c.fields?.allNodes?.length ?? '?'} nodes`,
      value: c.index,
    }));

  if (!items.length) { notify('No other DecisionGraphs in file'); return; }

  showPicker('↗ Move node to another DecisionGraph', items, targetDGIdx => {
    const targetDG = state.jazz.chunks[targetDGIdx];
    if (!targetDG || !targetDG.fields) return;

    // Remove from source DG
    srcDGChunk.fields.allNodes  = srcDGChunk.fields.allNodes.filter(i => i !== nodeIdx);
    srcDGChunk.fields.graphRoot = srcDGChunk.fields.graphRoot.filter(i => i !== nodeIdx);
    srcDGChunk.modified = true;

    // Add to target DG
    if (!targetDG.fields.allNodes.includes(nodeIdx))  targetDG.fields.allNodes.push(nodeIdx);
    if (!targetDG.fields.graphRoot.includes(nodeIdx)) targetDG.fields.graphRoot.push(nodeIdx);
    targetDG.modified = true;

    notify(`Moved node #${nodeIdx} to DecisionGraph #${targetDGIdx}`);
    state.selIdx = srcDGChunk.index;
    renderTree(); renderProps();
  });
}

// ═══════════════════════════════════════════════════════
// FILE I/O
// ═══════════════════════════════════════════════════════
function loadFile(file) {
  state.filename = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state.jazz = parseJazz(e.target.result);
      state.jazz.filename = file.name;
      state.selIdx = 0;
      treeExpanded.clear();
      treeExpanded.add(0);

      document.getElementById('saveBtn').disabled = false;
      document.getElementById('verSwitch').style.display = '';
      document.getElementById('topbar-row2').classList.add('active');
      document.getElementById('fileBadge').textContent = file.name;

      const v = state.jazz.version;
      const vb = document.getElementById('versionBadge');
      vb.innerHTML = `<span class="badge ${v === 2 ? 'badge-v2' : 'badge-v3'}">JAZZ v${v}</span>`;

      // Set save version default
      document.getElementById('saveVersion').value = v.toString();

      renderTree();
      renderProps();
      notify(`Loaded: ${file.name} — ${state.jazz.count} chunks`);
    } catch (err) {
      alert('Error: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveFile() {
  if (!state.jazz) return;
  const ver = parseInt(document.getElementById('saveVersion').value, 10) || state.jazz.version;
  const data = writeJazz(state.jazz, ver);
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = state.filename || 'output.jazz';
  a.click();
  URL.revokeObjectURL(url);
  notify(`Saved as JAZZ v${ver}: ${a.download}`);
}

// ═══════════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════════
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 40;

function pushUndo(label) {
  if (!state.jazz) return;
  const snap = JSON.stringify(state.jazz.chunks.map(c => ({
    fields: c.fields, instance: c.instance, modified: c.modified, isNew: c.isNew,
  })));
  undoStack.push({ label, snap, selIdx: state.selIdx, count: state.jazz.count });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
  updateUndoUI();
}

function applySnapshot(entry) {
  const parsed = JSON.parse(entry.snap);
  parsed.forEach((s, i) => {
    if (state.jazz.chunks[i]) {
      state.jazz.chunks[i].fields   = s.fields;
      state.jazz.chunks[i].instance = s.instance;
      state.jazz.chunks[i].modified = s.modified;
      state.jazz.chunks[i].isNew    = s.isNew;
    }
  });
  state.jazz.count = entry.count;
  state.selIdx = entry.selIdx;
}

function undo() {
  if (!undoStack.length) return;
  // Save current to redo
  const cur = JSON.stringify(state.jazz.chunks.map(c => ({
    fields: c.fields, instance: c.instance, modified: c.modified, isNew: c.isNew,
  })));
  redoStack.push({ label: 'redo', snap: cur, selIdx: state.selIdx, count: state.jazz.count });
  const entry = undoStack.pop();
  applySnapshot(entry);
  updateUndoUI();
  showUndoBar('↩ Undo: ' + entry.label);
  renderTree(); renderProps();
}

function redo() {
  if (!redoStack.length) return;
  const cur = JSON.stringify(state.jazz.chunks.map(c => ({
    fields: c.fields, instance: c.instance, modified: c.modified, isNew: c.isNew,
  })));
  undoStack.push({ label: 'redo', snap: cur, selIdx: state.selIdx, count: state.jazz.count });
  const entry = redoStack.pop();
  applySnapshot(entry);
  updateUndoUI();
  showUndoBar('↪ Redo: ' + entry.label);
  renderTree(); renderProps();
}

function updateUndoUI() {
  const bu = document.getElementById('btnUndo');
  const br = document.getElementById('btnRedo');
  bu.disabled = undoStack.length === 0;
  br.disabled = redoStack.length === 0;
  bu.title = undoStack.length ? `Undo: ${undoStack[undoStack.length-1].label}` : 'Nothing to undo';
  br.title = redoStack.length ? `Redo: ${redoStack[redoStack.length-1].label}` : 'Nothing to redo';
}

let undoBarTimer = null;
function showUndoBar(msg) {
  const b = document.getElementById('undoBar');
  b.textContent = msg; b.style.display = 'block';
  clearTimeout(undoBarTimer);
  undoBarTimer = setTimeout(() => b.style.display = 'none', 1800);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey||e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

const _origConfirmModal = confirmModal;
window.confirmModal = function(title, msg, label, onConfirm) {
  _origConfirmModal(title, msg, label, () => { pushUndo(label); onConfirm(); });
};

// ═══════════════════════════════════════════════════════
// FNV HASH CALCULATOR
// ═══════════════════════════════════════════════════════
function fnv32(str) {
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h;
}
function fnv32Lower(str) { return fnv32(str.toLowerCase()); }
function fnv64(str) {
  // FNV-1a 64-bit via two 32-bit halves
  let lo = 0x84222325 >>> 0, hi = 0xcbf29ce4 >>> 0;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    lo ^= c;
    // multiply by 0x00000100000001B3
    const lo2 = Math.imul(lo, 0x01000193) >>> 0;
    const hi2 = (Math.imul(hi, 0x01000193) + Math.imul(lo, 0x00000100) + (lo2 < lo ? 1 : 0)) >>> 0;
    lo = lo2; hi = hi2;
  }
  return { lo, hi };
}

function openHashCalc() {
  openSidePanel('🔢 FNV Hash Calculator', body => {
    const inp = document.createElement('input');
    inp.className = 'form-input'; inp.placeholder = 'Enter string (e.g. StateName)';
    inp.style.marginBottom = '8px';

    btnCalc.style.flex = '1';
    btnRow.appendChild(btnCalc);
    const btnClear = document.createElement('button');
    btnClear.className = 'btn btn-open'; btnClear.textContent = '✕';
    btnClear.onclick = () => { inp.value = ''; results.innerHTML = ''; };
    btnRow.appendChild(btnClear);
    body.appendChild(btnRow);

    const results = document.createElement('div');
    results.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    body.appendChild(results);

    // History section
    const histTitle = document.createElement('div');
    histTitle.style.cssText = 'font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-top:8px;';
    histTitle.textContent = 'Recent';
    body.appendChild(histTitle);
    const histList = document.createElement('div');
    histList.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
    body.appendChild(histList);

    const hashHistory = [];

    function calcAndShow() {
      const s = inp.value;
      if (!s) return;
      const f32  = fnv32(s);
      const f32l = fnv32Lower(s);
      const f64  = fnv64(s);
      const f64l = fnv64(s.toLowerCase());

      results.innerHTML = '';

      function makeResult(label, valHex) {
        const d = document.createElement('div');
        d.className = 'hash-result';
        d.innerHTML = `<span><span class="hr-label">${label}</span><br><b>${valHex}</b></span><span class="hr-copy" title="Copy">📋</span>`;
        d.querySelector('.hr-copy').onclick = () => { navigator.clipboard?.writeText(valHex); notify(`Copied: ${valHex}`); };
        return d;
      }

      results.appendChild(makeResult('FNV32 (exact case)', h8(f32)));
      results.appendChild(makeResult('FNV32 (lowercase)', h8(f32l)));
      results.appendChild(makeResult('FNV64 (exact case)', h64(f64.lo, f64.hi)));
      results.appendChild(makeResult('FNV64 (lowercase)', h64(f64l.lo, f64l.hi)));

      // Add to history
      if (!hashHistory.includes(s)) {
        hashHistory.unshift(s);
        if (hashHistory.length > 10) hashHistory.pop();
        histList.innerHTML = '';
        hashHistory.forEach(hs => {
          const hd = document.createElement('div');
          hd.style.cssText = 'padding:3px 6px;cursor:pointer;font-family:JetBrains Mono,monospace;font-size:11px;color:var(--text2);border-radius:3px;';
          hd.textContent = hs;
          hd.addEventListener('mouseenter', () => hd.style.background='var(--bg3)');
          hd.addEventListener('mouseleave', () => hd.style.background='');
          hd.onclick = () => { inp.value = hs; calcAndShow(); };
          histList.appendChild(hd);
        });
      }
    }

    btnCalc.addEventListener('click', calcAndShow);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') calcAndShow(); });
    setTimeout(() => inp.focus(), 50);
  });
}

// ═══════════════════════════════════════════════════════
// SEARCH / FIND BY HASH
// ═══════════════════════════════════════════════════════
function searchJazz(query) {
  if (!state.jazz) return [];
  const q = query.trim().toLowerCase().replace(/^0x/i,'');
  if (!q) return [];
  const results = [];

  state.jazz.chunks.forEach(c => {
    if (!c.fields) return;
    const f = c.fields;
    const chunkName = c.typeName;

    function check(fieldName, value, valueHex) {
      if (!valueHex) return;
      const vl = valueHex.toLowerCase().replace(/^0x/,'');
      if (vl.includes(q)) {
        results.push({ chunkIdx: c.index, chunkName, fieldName, value: valueHex });
      }
    }

    // StateMachine
    if (c.type === 0x02d5df13) {
      check('Name', f.name, h8(f.name));
      check('Instance ID', null, h64(c.instance.lo, c.instance.hi));
    }
    // State
    if (c.type === 0x02eedafe) {
      check('StateName', f.stateName, h8(f.stateName));
    }
    // ActorDefinition
    if (c.type === 0x02eedb2f) {
      check('ParameterName', f.parameterName, h8(f.parameterName));
      check('DefaultValue', f.defaultValue, h8(f.defaultValue));
    }
    // ParameterDefinition
    if (c.type === 0x02eedb46) {
      check('ParamName', f.paramName, h8(f.paramName));
    }
    // PlayAnimation
    if (c.type === 0x02eedb5f && f.clip) {
      check('Clip.Instance', null, h64(f.clip.instance.lo, f.clip.instance.hi));
      check('Clip.Type',     null, h8(f.clip.type));
      check('StrData',       null, f.strData || null);
    }
    // Unknown generic fields - scan raw uint32s
    if (!c.fields || Object.keys(c.fields).length === 0) {
      const dv = new DataView(c.rawData.buffer, c.rawData.byteOffset, c.rawData.byteLength);
      for (let i = 8; i+3 < c.rawData.length; i+=4) {
        const v = dv.getUint32(i, true);
        const vh = h8(v).toLowerCase().replace('0x','');
        if (vh.includes(q)) {
          check(`raw[+${i.toString(16)}]`, v, h8(v));
          break;
        }
      }
    }
  });

  return results;
}

function openSearch() {
  openSidePanel('🔍 Search by Hash', body => {
    const inp = document.createElement('input');
    inp.className = 'form-input'; inp.placeholder = 'Hash fragment e.g. 42E0CFBC';
    body.appendChild(inp);

    const summary = document.createElement('div');
    summary.style.cssText = 'font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;min-height:16px;';
    body.appendChild(summary);

    const resList = document.createElement('div');
    resList.style.cssText = 'display:flex;flex-direction:column;gap:3px;';
    body.appendChild(resList);

    let searchTimer;
    function doSearch() {
      const q = inp.value.trim();
      resList.innerHTML = '';
      if (q.length < 2) { summary.textContent = 'Type at least 2 characters'; return; }
      const results = searchJazz(q);
      summary.textContent = `${results.length} match${results.length !== 1 ? 'es' : ''}`;
      results.forEach(r => {
        const d = document.createElement('div');
        d.className = 'search-result';
        d.innerHTML = `<div><span class="sr-type">${r.chunkName} #${r.chunkIdx}</span> <span class="sr-loc">${r.fieldName}</span></div><div class="sr-match">${r.value}</div>`;
        d.onclick = () => {
          state.selIdx = r.chunkIdx;
          treeExpanded.add(r.chunkIdx);
          renderTree(); renderProps();
        };
        resList.appendChild(d);
      });
    }

    inp.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 200); });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(); } });
    setTimeout(() => inp.focus(), 50);
  });
}

document.getElementById('btnSearch').addEventListener('click', openSearch);

// ═══════════════════════════════════════════════════════
// VALIDATE FILE
// ═══════════════════════════════════════════════════════
function validateJazz() {
  if (!state.jazz) return [];
  const issues = [];
  const chunks = state.jazz.chunks;

  chunks.forEach(c => {
    if (!c.fields) return;
    const f = c.fields;
    const loc = `${c.typeName} #${c.index}`;

    function checkRef(name, idx) {
      if (idx === null || idx === undefined) return;
      if (idx < 0 || idx >= chunks.length) issues.push({ sev:'error', msg:`${loc}: ${name} ref #${idx} is OUT OF BOUNDS`, idx: c.index });
      else if (!chunks[idx]) issues.push({ sev:'error', msg:`${loc}: ${name} ref #${idx} is NULL`, idx: c.index });
    }

    // StateMachine
    if (c.type === 0x02d5df13) {
      (f.actorDefs||[]).forEach((i,n) => checkRef(`actorDefs[${n}]`, i));
      (f.paramDefs||[]).forEach((i,n) => checkRef(`paramDefs[${n}]`, i));
      (f.states||[]).forEach((i,n) => checkRef(`states[${n}]`, i));
      if (f.sentinel !== 0xDEADBEEF) issues.push({ sev:'error', msg:`${loc}: Sentinel is ${h8(f.sentinel)}, expected 0xDEADBEEF`, idx: c.index });
      if (c.instance.lo === 0 && c.instance.hi === 0) issues.push({ sev:'warn', msg:`${loc}: Instance ID is zero — AcquireStateMachine() may not find this`, idx: c.index });
    }
    // State
    if (c.type === 0x02eedafe) {
      checkRef('dgIndex', f.dgIndex);
      (f.transitions||[]).forEach((i,n) => checkRef(`transitions[${n}]`, i));
      if (f.dgIndex !== null && chunks[f.dgIndex]?.type !== 0x02eedb18)
        issues.push({ sev:'error', msg:`${loc}: dgIndex #${f.dgIndex} is not a DecisionGraph`, idx: c.index });
    }
    // DecisionGraph
    if (c.type === 0x02eedb18) {
      (f.allNodes||[]).forEach((i,n) => checkRef(`allNodes[${n}]`, i));
      (f.graphRoot||[]).forEach((i,n) => checkRef(`graphRoot[${n}]`, i));
      (f.graphRoot||[]).forEach(i => {
        if (i !== null && !(f.allNodes||[]).includes(i))
          issues.push({ sev:'warn', msg:`${loc}: graphRoot #${i} not in allNodes`, idx: c.index });
      });
      if (f.sentinel !== 0xDEADBEEF) issues.push({ sev:'error', msg:`${loc}: Bad sentinel`, idx: c.index });
    }
    // PlayAnimation
    if (c.type === 0x02eedb5f) {
      if (f.actorIdx !== null) checkRef('actorIdx', f.actorIdx);
      if (f.sentinel1 !== 0xDEADBEEF || f.sentinel2 !== 0xDEADBEEF || f.sentinel3 !== 0xDEADBEEF)
        issues.push({ sev:'warn', msg:`${loc}: One or more sentinels are bad`, idx: c.index });
    }
    // Stop
    if (c.type === 0x0344d438) {
      if (f.actorIdx !== null) checkRef('actorIdx', f.actorIdx);
    }
  });

  // Check for orphan chunks (not referenced by anything)
  const referenced = new Set([0]); // SM always root
  chunks.forEach(c => {
    if (!c.fields) return;
    const f = c.fields;
    const addRef = i => { if (i !== null && i !== undefined) referenced.add(i); };
    (f.actorDefs||[]).forEach(addRef); (f.paramDefs||[]).forEach(addRef);
    (f.states||[]).forEach(addRef); (f.transitions||[]).forEach(addRef);
    if (f.dgIndex !== undefined) addRef(f.dgIndex);
    (f.allNodes||[]).forEach(addRef); (f.graphRoot||[]).forEach(addRef);
    (f.actions||[]).forEach(addRef);
    if (f.actorIdx !== undefined) addRef(f.actorIdx);
    if (f.stateIdx !== undefined) addRef(f.stateIdx);
    if (f.choices) f.choices.forEach(ch => (ch.actions||[]).forEach(addRef));
  });
  chunks.forEach((c, i) => {
    if (!referenced.has(i))
      issues.push({ sev:'warn', msg:`Chunk #${i} (${c.typeName}) is ORPHAN — not referenced by anything`, idx: i });
  });

  return issues;
}

function openValidate() {
  openSidePanel('✅ Validate File', body => {
    if (!state.jazz) { body.textContent = 'No file loaded'; return; }
    const issues = validateJazz();
    if (!issues.length) {
      const ok = document.createElement('div');
      ok.className = 'val-ok';
      ok.textContent = `✅ All ${state.jazz.count} chunks look good!`;
      body.appendChild(ok);
      return;
    }
    const summary = document.createElement('div');
    const errs  = issues.filter(i=>i.sev==='error').length;
    const warns = issues.filter(i=>i.sev==='warn').length;
    summary.style.cssText = 'font-size:12px;margin-bottom:8px;';
    summary.innerHTML = `<span style="color:var(--error)">⛔ ${errs} error(s)</span>  <span style="color:var(--warn)">⚠ ${warns} warning(s)</span>`;
    body.appendChild(summary);
    issues.forEach(iss => {
      const d = document.createElement('div');
      d.className = iss.sev === 'error' ? 'val-error' : 'val-warn';
      d.textContent = (iss.sev === 'error' ? '⛔ ' : '⚠ ') + iss.msg;
      if (iss.idx !== undefined) {
        d.onclick = () => { state.selIdx = iss.idx; treeExpanded.add(iss.idx); renderTree(); renderProps(); };
      }
      body.appendChild(d);
    });
  });
}

document.getElementById('btnValidate').addEventListener('click', openValidate);

// ═══════════════════════════════════════════════════════
// EXPORT AS TEXT SCRIPT (SmoothJazz-style)
// ═══════════════════════════════════════════════════════
function exportJazzScript() {
  if (!state.jazz) return '';
  const chunks = state.jazz.chunks;
  const lines = [];
  const seen  = new Set();

  function ln(s, indent=0) { lines.push('  '.repeat(indent) + s); }
  function kw(s)   { return `<span class="exp-kw">${s}</span>`; }
  function nm(s)   { return `<span class="exp-name">${s}</span>`; }
  function hx(s)   { return `<span class="exp-hash">${s}</span>`; }
  function rf(s)   { return `<span class="exp-ref">${s}</span>`; }
  function cmt(s)  { return `<span class="exp-cmt">// ${s}</span>`; }

  function fmtHash(h) { return hx(h8(h)); }
  function fmtIdx(i)  { return i !== null ? rf(`#${i}`) : hx('null'); }

  function fmtNode(idx, depth) {
    if (idx === null || seen.has(idx)) return;
    const c = chunks[idx];
    if (!c) return;
    seen.add(idx);
    const f = c.fields;

    if (c.type === 0x02eedb5f) { // Play
      const clip = f?.clip ? h64(f.clip.instance.lo, f.clip.instance.hi) : '?';
      const str  = f?.strData ? ` ${cmt('Substitution: '+f.strData)}` : '';
      ln(`${kw('Play')} ${hx(clip)}${str}`, depth);
      if (f?.actorIdx !== null && f?.actorIdx !== undefined) ln(`  ${kw('for')} Actor ${fmtIdx(f.actorIdx)}`, depth);
      (f?.actions||[]).forEach(i => fmtNode(i, depth+1));
    } else if (c.type === 0x0344d438) { // Stop
      const actor = f?.actorIdx !== null ? ` ${kw('for')} ${fmtIdx(f.actorIdx)}` : '';
      ln(`${kw('Stop Animation')}${actor}`, depth);
      (f?.actions||[]).forEach(i => fmtNode(i, depth+1));
    } else if (c.type === 0x02eedb70) { // Random
      ln(`${kw('Select Random')}`, depth);
      (f?.choices||[]).forEach(ch => {
        ln(`  ${kw('Weight')} ${hx(ch.weight?.toFixed(3)||'?')} {`, depth);
        (ch.actions||[]).forEach(i => fmtNode(i, depth+2));
        ln(`  }`, depth);
      });
    } else if (c.type === 0x02eeebdc) { // NextState
      ln(`${kw('Next State')} ${fmtIdx(f?.stateIdx)}`, depth);
    } else if (c.type === 0x02eeebdd) { // Prop
      const cr = f?.catalogRef ? h64(f.catalogRef.instance.lo, f.catalogRef.instance.hi) : '?';
      ln(`${kw('Create Prop')} ${hx(cr)} ${kw('as')} ${fmtIdx(f?.actorIdx)}`, depth);
    } else {
      ln(`${kw(c.typeName)} ${cmt('#'+idx)}`, depth);
    }
  }

  function fmtState(idx) {
    const c = chunks[idx];
    if (!c?.fields) return;
    const f = c.fields;
    ln(`${kw('State')} ${fmtHash(f.stateName)} {`, 1);
    const props = [];
    if (f.stateProperties & 0x01) props.push('Loop');
    if (f.stateProperties & 0x02) props.push('Persistent');
    if (f.stateProperties & 0x04) props.push('Entry');
    if (f.stateProperties & 0x08) props.push('Exit');
    if (props.length) ln(`${kw('Properties')} ${props.join(' | ')}`, 2);
    (f.transitions||[]).forEach(ti => {
      const tc = chunks[ti];
      if (tc?.fields) ln(`${kw('Transitions to')} ${fmtHash(tc.fields.stateName)}`, 2);
    });
    // DG
    const dg = f.dgIndex !== null ? chunks[f.dgIndex] : null;
    if (dg?.fields) {
      ln(`${kw('Decision Graph')} {`, 2);
      (dg.fields.graphRoot||[]).forEach(ni => { seen.clear(); fmtNode(ni, 3); });
      ln(`}`, 2);
    }
    ln(`}`, 1);
  }

  const sm = chunks[0];
  if (!sm?.fields) return '// No StateMachine';

  ln(`${kw('State Machine')} ${fmtHash(sm.fields.name)} {`);
  ln(`  ${cmt('Instance: '+h64(sm.instance.lo, sm.instance.hi))}`, 0);
  (sm.fields.actorDefs||[]).forEach(ai => {
    const ac = chunks[ai];
    if (ac?.fields) ln(`  ${kw('Actor')} ${fmtHash(ac.fields.parameterName)}`, 0);
  });
  (sm.fields.paramDefs||[]).forEach(pi => {
    const pc = chunks[pi];
    if (pc?.fields) ln(`  ${kw('Parameter')} ${fmtHash(pc.fields.paramName)}`, 0);
  });
  (sm.fields.states||[]).forEach(si => fmtState(si));
  ln(`}`);

  return lines.join('\n');
}

function openExport() {
  openSidePanel('📄 Export Script', body => {
    if (!state.jazz) { body.textContent = 'No file loaded'; return; }
    const topBar = document.createElement('div');
    topBar.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;';
    const btnCopy = document.createElement('button');
    btnCopy.className = 'btn btn-action btn-add'; btnCopy.textContent = '📋 Copy all';
    const btnDl = document.createElement('button');
    btnDl.className = 'btn btn-open'; btnDl.textContent = '⬇ Download .txt';
    topBar.appendChild(btnCopy); topBar.appendChild(btnDl);
    body.appendChild(topBar);

    const box = document.createElement('div');
    box.className = 'export-box';
    const script = exportJazzScript();
    box.innerHTML = script;
    body.appendChild(box);

    btnCopy.onclick = () => {
      navigator.clipboard?.writeText(box.innerText);
      notify('Script copied to clipboard');
    };
    btnDl.onclick = () => {
      const blob = new Blob([box.innerText], {type:'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (state.filename||'jazz').replace('.jazz','')+'.txt';
      a.click();
    };
  });
}

document.getElementById('btnExport').addEventListener('click', openExport);

// ═══════════════════════════════════════════════════════
// COMPARE TWO .jazz FILES
// ═══════════════════════════════════════════════════════
let compareJazz = null;

function openCompare() {
  if (!state.jazz) { notify('Load a file first'); return; }
  document.getElementById('compareInput').click();
}

document.getElementById('compareInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      compareJazz = parseJazz(ev.target.result);
      compareJazz.filename = file.name;
      showComparePanel();
    } catch(err) { alert('Error loading compare file: ' + err.message); }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
});

function showComparePanel() {
  const a = state.jazz, b = compareJazz;
  openSidePanel(`⚖ Compare: ${a.filename} ↔ ${b.filename}`, body => {
    const summary = document.createElement('div');
    summary.style.cssText = 'font-family:JetBrains Mono,monospace;font-size:11px;margin-bottom:10px;color:var(--text2);';
    summary.innerHTML = `File A: <b>${a.count}</b> chunks &nbsp; File B: <b>${b.count}</b> chunks`;
    body.appendChild(summary);

    const diffs = [];

    // Compare by chunk type+index
    const maxLen = Math.max(a.chunks.length, b.chunks.length);
    for (let i = 0; i < maxLen; i++) {
      const ca = a.chunks[i], cb = b.chunks[i];
      if (!ca && cb) { diffs.push({ type:'added',   label:`Chunk #${i} ${cb.typeName}`, sub:`Only in ${b.filename}` }); continue; }
      if (ca && !cb) { diffs.push({ type:'removed', label:`Chunk #${i} ${ca.typeName}`, sub:`Only in ${a.filename}` }); continue; }
      if (!ca || !cb) continue;
      if (ca.type !== cb.type) {
        diffs.push({ type:'changed', label:`Chunk #${i} type changed`, sub:`${ca.typeName} → ${cb.typeName}`, chunkIdx: i }); continue;
      }
      // Compare fields
      const fa = JSON.stringify(ca.fields), fb = JSON.stringify(cb.fields);
      if (fa !== fb) {
        diffs.push({ type:'changed', label:`${ca.typeName} #${i} fields differ`, sub: diffSummary(ca.fields, cb.fields), chunkIdx: i });
      }
    }

    if (!diffs.length) {
      const ok = document.createElement('div'); ok.className = 'val-ok';
      ok.textContent = '✅ Files are identical'; body.appendChild(ok); return;
    }

    const dsummary = document.createElement('div');
    dsummary.style.cssText = 'font-size:12px;margin-bottom:8px;';
    const added   = diffs.filter(d=>d.type==='added').length;
    const removed = diffs.filter(d=>d.type==='removed').length;
    const changed = diffs.filter(d=>d.type==='changed').length;
    dsummary.innerHTML = `<span style="color:var(--accent3)">+${added} added</span>  <span style="color:var(--error)">-${removed} removed</span>  <span style="color:var(--warn)">~${changed} changed</span>`;
    body.appendChild(dsummary);

    diffs.forEach(d => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:6px 8px;border-radius:4px;margin-bottom:3px;font-family:JetBrains Mono,monospace;font-size:11px;cursor:pointer;';
      row.classList.add(d.type === 'added' ? 'diff-added' : d.type === 'removed' ? 'diff-removed' : 'diff-changed');
      const sym = d.type === 'added' ? '+' : d.type === 'removed' ? '-' : '~';
      row.innerHTML = `<b style="color:${d.type==='added'?'var(--accent3)':d.type==='removed'?'var(--error)':'var(--warn)'}">${sym} ${d.label}</b><br><span style="color:var(--text3)">${d.sub||''}</span>`;
      if (d.chunkIdx !== undefined) {
        row.onclick = () => { state.selIdx = d.chunkIdx; treeExpanded.add(d.chunkIdx); renderTree(); renderProps(); };
      }
      body.appendChild(row);
    });
  });
}

function diffSummary(fa, fb) {
  if (!fa || !fb) return 'fields differ';
  const changed = [];
  for (const key of new Set([...Object.keys(fa||{}), ...Object.keys(fb||{})])) {
    if (JSON.stringify(fa?.[key]) !== JSON.stringify(fb?.[key])) changed.push(key);
  }
  return changed.slice(0,4).join(', ') + (changed.length > 4 ? '…' : '');
}

document.getElementById('btnCompare').addEventListener('click', openCompare);
