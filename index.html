<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sims 3 Jazz Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #181c26;
  --border: #1e2535;
  --accent: #4fc3f7;
  --accent2: #7c83fd;
  --accent3: #69ffb4;
  --text: #c8d3ea;
  --text2: #687590;
  --text3: #3d4a62;
  --warn: #ffb347;
  --error: #ff6b6b;
  --ok: #69ffb4;
  --sm-color: #7c83fd;
  --state-color: #4fc3f7;
  --dg-color: #ffb347;
  --node-color: #69ffb4;
  --actor-color: #c084fc;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
}

/* ─── TOPBAR ─────────────────────────────────────── */
#topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
}

#topbar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent2), var(--accent), transparent 60%);
}

/* Row 1: identity + file + save */
#topbar-row1 {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 44px;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

/* Row 2: tool strip — only visible when file loaded */
#topbar-row2 {
  display: none;
  align-items: center;
  padding: 0 16px;
  height: 34px;
  gap: 2px;
}
#topbar-row2.active { display: flex; }

/* Logo */
.logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 2px;
  color: var(--accent2);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.logo-sub {
  color: var(--text3);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  margin-left: 2px;
}

/* Divider between logo and file info */
.tb-divider {
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 12px;
  flex-shrink: 0;
}

/* File info area */
#tb-fileinfo {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.topbar-file {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 280px;
}

/* Save-as dropdown (compact) */
.ver-switch {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.ver-switch select {
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* Badge */
.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 1px;
  font-weight: 700;
  flex-shrink: 0;
}
.badge-v2 { background: #1a3a1a; color: #69ffb4; border: 1px solid #1a4a1a; }
.badge-v3 { background: #3a1a1a; color: #ff8a80; border: 1px solid #4a1a1a; }
.badge-info { background: #1a2a3a; color: var(--accent); border: 1px solid #1a354a; }

/* Row1 right-side buttons */
.tb-r1-btns {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* Primary buttons (row 1) */
.btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.5px;
  padding: 6px 16px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  text-transform: uppercase;
}
.btn-open {
  background: var(--bg3);
  color: var(--accent);
  border: 1px solid var(--border);
}
.btn-open:hover { background: rgba(79,195,247,0.08); border-color: var(--accent); }
.btn-save {
  background: var(--accent2);
  color: white;
}
.btn-save:hover { background: #6366f1; }
.btn-save:disabled { background: var(--bg3); color: var(--text3); cursor: default; border: 1px solid var(--border); }

/* ─── TOOL STRIP (Row 2) ─────────────────────────── */
/* Segmented groups with separators */
.tb-group {
  display: flex;
  align-items: center;
  gap: 1px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px;
  margin-right: 6px;
}
.tb-group:last-child { margin-right: 0; }

.tb-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  padding: 3px 9px;
  border-radius: 3px;
  border: none;
  cursor: pointer;
  color: var(--text2);
  background: transparent;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  height: 24px;
}
.tb-btn:hover:not(:disabled) {
  background: var(--bg2);
  color: var(--text);
}
.tb-btn:disabled { opacity: 0.35; cursor: default; }
.tb-btn.active { background: var(--bg2); color: var(--accent); }

/* specific btn colors */
.tb-btn.undo-redo { color: var(--text3); }
.tb-btn.undo-redo:hover:not(:disabled) { color: var(--accent2); }
.tb-btn.validate  { }
.tb-btn.validate:hover { color: var(--accent3) !important; }
.tb-btn.export    { }
.tb-btn.compare   { }
.tb-btn.hash      { }
.tb-btn.search    { }

.tb-spacer { flex: 1; }

/* ─── MAIN WORKSPACE ─────────────────────────────── */
#workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── TREE PANEL ─────────────────────────────────── */
#tree-panel {
  width: 280px;
  min-width: 180px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

#tree-header {
  padding: 10px 12px 8px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  flex-shrink: 0;
}

#tree-body { flex: 1; overflow-y: auto; padding: 6px 4px; }

.drop-zone {
  margin: 16px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 40px 20px;
  text-align: center;
  color: var(--text3);
  transition: all 0.2s;
}
.drop-zone.drag-over {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(79, 195, 247, 0.05);
}
.drop-zone .dz-icon { font-size: 36px; margin-bottom: 10px; }
.drop-zone .dz-title { font-size: 13px; font-weight: 600; }
.drop-zone .dz-sub { font-size: 11px; margin-top: 4px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

/* TREE ITEMS */
.tree-node { user-select: none; }

.tree-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.1s;
  font-weight: 500;
}
.tree-item:hover { background: var(--bg3); }
.tree-item.selected {
  background: rgba(124, 131, 253, 0.12);
  border-left: 2px solid var(--accent2);
  padding-left: 6px;
}

.tree-toggle {
  color: var(--text3);
  font-size: 9px;
  width: 12px;
  text-align: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}

.tree-icon { font-size: 13px; flex-shrink: 0; }

.tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.tree-label .tl-type {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  opacity: 0.5;
}
.tree-label .tl-name { font-weight: 600; }

.tree-label.color-sm .tl-name { color: var(--sm-color); }
.tree-label.color-state .tl-name { color: var(--state-color); }
.tree-label.color-dg .tl-name { color: var(--dg-color); }
.tree-label.color-node .tl-name { color: var(--node-color); }
.tree-label.color-actor .tl-name { color: var(--actor-color); }

.tree-children { padding-left: 14px; }

/* ─── PROPS PANEL ────────────────────────────────── */
#props-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--bg);
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  gap: 12px;
}
.empty-state .es-icon { font-size: 56px; }
.empty-state .es-title { font-size: 16px; font-weight: 600; }
.empty-state .es-sub { font-size: 12px; font-family: 'JetBrains Mono', monospace; }

/* PROP SECTIONS */
.prop-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
}

.prop-section-header {
  padding: 8px 14px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
}

.prop-section-body { padding: 10px 14px; }

.prop-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.prop-row:last-child { margin-bottom: 0; }

.prop-label {
  font-size: 12px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.prop-value {
  display: flex;
  align-items: center;
  gap: 6px;
}

.prop-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  padding: 4px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  transition: border-color 0.1s;
}
.prop-input:focus {
  outline: none;
  border-color: var(--accent2);
}
.prop-input.readonly { color: var(--text3); cursor: default; }
.prop-input.modified { border-color: var(--warn); color: var(--warn); }

.prop-hint {
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}

/* Chunk info bar */
.chunk-infobar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.chunk-infobar .ci-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}
.chunk-infobar .ci-item b { color: var(--text2); }

/* Link items */
.link-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  transition: background 0.1s;
  margin-bottom: 3px;
}
.link-item:hover { background: rgba(79, 195, 247, 0.08); }
.link-item .li-icon { flex-shrink: 0; }
.link-item .li-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.link-item .li-idx { color: var(--text3); flex-shrink: 0; }

.no-items {
  font-size: 12px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  padding: 4px 0;
  font-style: italic;
}

/* Hex view */
.hex-view {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  background: var(--bg);
  border-radius: 4px;
  padding: 10px;
  overflow-x: auto;
  white-space: pre;
  border: 1px solid var(--border);
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.6;
}
.hex-view .hx-offset { color: var(--text3); }
.hex-view .hx-hex { color: var(--text2); }
.hex-view .hx-ascii { color: var(--accent3); opacity: 0.6; }

/* Stats strip */
.stats-strip {
  display: flex;
  gap: 16px;
  padding: 10px 14px;
  font-size: 12px;
  flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat .sv { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); }
.stat .sk { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

/* ─── SCROLLBAR ──────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ─── SIDE PANEL (search / hash / compare / export) ──────────── */
#side-panel {
  width: 340px; min-width: 240px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: none; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
}
#side-panel.active { display: flex; }
#side-panel-header {
  display: flex; align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3); gap: 8px;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text3); font-weight:700;
}
#side-panel-header span { flex:1; }
#side-panel-close { cursor:pointer; color:var(--text3); font-size:16px; line-height:1; }
#side-panel-close:hover { color:var(--text); }
#side-panel-body { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }

/* hash calc */
.hash-row { display:flex; gap:6px; }
.hash-result {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--accent3); background:var(--bg); border:1px solid var(--border);
  border-radius:3px; padding:6px 10px; display:flex;
  justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;
}
.hash-result .hr-label { color:var(--text3); font-size:10px; }
.hash-result .hr-copy { cursor:pointer; color:var(--accent); font-size:10px; }
.hash-result .hr-copy:hover { text-decoration:underline; }

/* search results */
.search-result {
  padding:6px 8px; border-radius:4px; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--text2); border:1px solid transparent;
  transition:background 0.1s;
}
.search-result:hover { background:var(--bg3); border-color:var(--border); color:var(--text); }
.search-result .sr-match { color:var(--warn); font-weight:700; }
.search-result .sr-type  { color:var(--accent2); font-size:10px; }
.search-result .sr-loc   { color:var(--text3); font-size:10px; }

/* validate */
.val-ok    { color:var(--ok); font-size:12px; font-family:'JetBrains Mono',monospace; }
.val-warn  { color:var(--warn); font-size:12px; font-family:'JetBrains Mono',monospace; cursor:pointer; }
.val-warn:hover { text-decoration:underline; }
.val-error { color:var(--error); font-size:12px; font-family:'JetBrains Mono',monospace; cursor:pointer; }
.val-error:hover { text-decoration:underline; }

/* compare */
.diff-added   { background:rgba(105,255,180,0.07); border-left:2px solid var(--accent3); }
.diff-removed { background:rgba(255,107,107,0.07); border-left:2px solid var(--error); }
.diff-changed { background:rgba(255,179,71,0.07);  border-left:2px solid var(--warn); }

/* export */
.export-box {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--text2); background:var(--bg); border:1px solid var(--border);
  border-radius:4px; padding:10px; white-space:pre; overflow-x:auto;
  max-height:60vh; overflow-y:auto; line-height:1.7;
}
.exp-kw   { color:var(--accent2); }
.exp-name { color:var(--accent3); }
.exp-hash { color:var(--warn); }
.exp-ref  { color:var(--accent); }
.exp-cmt  { color:var(--text3); }

/* undo indicator */
#undoBar {
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  background:var(--bg3); border:1px solid var(--border);
  padding:4px 14px; border-radius:4px; font-size:11px; color:var(--text2);
  font-family:'JetBrains Mono',monospace; z-index:50; pointer-events:none;
}


/* ─── DRAG REORDER ───────────────────────────────────────────── */
.sortable-list { display:flex; flex-direction:column; gap:2px; }
.sortable-item {
  display:flex; align-items:center; gap:6px;
  padding:5px 8px; border-radius:4px;
  background:var(--bg3); border:1px solid transparent;
  cursor:grab; user-select:none; transition:background 0.1s, border-color 0.1s;
  font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2);
}
.sortable-item:active { cursor:grabbing; }
.sortable-item.drag-over { border-color:var(--accent2); background:rgba(124,131,253,0.1); }
.sortable-item.dragging  { opacity:0.4; }
.sort-grip { color:var(--text3); font-size:13px; flex-shrink:0; cursor:grab; }
.sort-icon { flex-shrink:0; }
.sort-label { flex:1; }
.sort-sub   { color:var(--text3); font-size:10px; }
.sort-btn-del { margin-left:4px; opacity:0; color:var(--error); padding:0 4px; border-radius:3px; font-size:12px; transition:opacity 0.1s; flex-shrink:0; }
.sortable-item:hover .sort-btn-del { opacity:1; }
.sort-btn-del:hover { background:rgba(255,107,107,0.15); }
.sort-btn-move { opacity:0; color:var(--accent); padding:0 4px; border-radius:3px; font-size:12px; transition:opacity 0.1s; flex-shrink:0; cursor:pointer; }
.sortable-item:hover .sort-btn-move { opacity:1; }
.sort-btn-move:hover { background:rgba(79,195,247,0.15); }


/* ─── PICKER & FORM MODALS ───────────────────────────────────── */
#picker-overlay, #form-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.65); z-index:201;
  align-items:center; justify-content:center;
}
#picker-overlay.active, #form-overlay.active { display:flex; }

#picker-box {
  background:var(--bg2); border:1px solid var(--border);
  border-top:3px solid var(--accent2); border-radius:8px;
  padding:20px; width:420px; max-height:72vh;
  display:flex; flex-direction:column; gap:10px;
}
#picker-box h3 { font-size:14px; font-weight:700; color:var(--accent2); }
#picker-search {
  background:var(--bg); border:1px solid var(--border); border-radius:4px;
  color:var(--text); padding:6px 10px;
  font-family:'JetBrains Mono',monospace; font-size:12px; outline:none;
}
#picker-search:focus { border-color:var(--accent2); }
#picker-list {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:2px; min-height:80px;
}
.picker-item {
  padding:7px 10px; border-radius:4px; cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--text2); display:flex; align-items:center; gap:8px;
  transition:background 0.1s;
}
.picker-item:hover { background:var(--bg3); color:var(--text); }
.picker-item .pi-tag {
  font-size:10px; padding:1px 5px; border-radius:2px;
  background:rgba(124,131,253,0.15); color:var(--accent2); flex-shrink:0;
}
.picker-item .pi-sub { color:var(--text3); font-size:10px; }

#form-box {
  background:var(--bg2); border:1px solid var(--border);
  border-top:3px solid var(--accent3); border-radius:8px;
  padding:22px; width:440px; max-height:80vh;
  display:flex; flex-direction:column; gap:12px; overflow-y:auto;
}
#form-box h3 { font-size:14px; font-weight:700; color:var(--accent3); }
.form-field { display:flex; flex-direction:column; gap:4px; }
.form-field label {
  font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace;
  text-transform:uppercase; letter-spacing:0.5px;
}
.form-input {
  background:var(--bg); border:1px solid var(--border); border-radius:3px;
  color:var(--text); padding:6px 10px;
  font-family:'JetBrains Mono',monospace; font-size:12px; outline:none;
}
.form-input:focus { border-color:var(--accent3); }
.form-input-row { display:flex; gap:6px; }
.form-input-row .form-input { flex:1; }
.form-select {
  background:var(--bg3); border:1px solid var(--border); border-radius:3px;
  color:var(--text); padding:6px 8px;

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const CHUNK_TYPES = {
  0x02d5df13: 'StateMachine',
  0x02eedafe: 'State',
  0x02eedb18: 'DecisionGraph',
  0x02eedb2f: 'ActorDefinition',
  0x02eedb46: 'ParameterDefinition',
  0x02eedb5f: 'PlayAnimation',
  0x02eedb70: 'Random',
  0x02eedb92: 'SelectOnParameter',
  0x02eeebdc: 'NextState',
  0x02eeebdd: 'Prop',
  0x02eeebde: 'ActorOperation',
  0x0344d438: 'Stop',
};

const CHUNK_ICONS = {
  StateMachine:        '🎭',
  State:               '📌',
  DecisionGraph:       '🔀',
  PlayAnimation:       '▶',
  Random:              '🎲',
  Stop:                '⏹',
  Prop:                '🎬',
  NextState:           '➡',
  ActorDefinition:     '🎪',
  ParameterDefinition: '⚙',
  SelectOnParameter:   '🔧',
  ActorOperation:      '🎯',
};

const CHUNK_COLOR_CLASS = {
  StateMachine:        'color-sm',
  State:               'color-state',
  DecisionGraph:       'color-dg',
  PlayAnimation:       'color-node',
  Random:              'color-node',
  Stop:                'color-node',
  Prop:                'color-node',
  NextState:           'color-node',
  SelectOnParameter:   'color-node',
  ActorDefinition:     'color-actor',
  ParameterDefinition: 'color-actor',
};

// ═══════════════════════════════════════════════════════
// BINARY I/O
// ═══════════════════════════════════════════════════════
class BinReader {
  constructor(buffer) {
    this.buf = buffer;
    this.view = new DataView(buffer);
    this.pos = 0;
  }
  u8()  { return this.view.getUint8(this.pos++); }
  u16() { const v = this.view.getUint16(this.pos, true); this.pos += 2; return v; }
  u32() { const v = this.view.getUint32(this.pos, true); this.pos += 4; return v >>> 0; }
  i32() { const v = this.view.getInt32(this.pos, true); this.pos += 4; return v; }
  f32() { const v = this.view.getFloat32(this.pos, true); this.pos += 4; return v; }
  u64() { const lo = this.u32(); const hi = this.u32(); return { lo, hi }; }
  fourcc() {
    let s = '';
    for (let i = 0; i < 4; i++) s += String.fromCharCode(this.view.getUint8(this.pos + i));
    this.pos += 4;
    return s;
  }
  str() {
    const len = this.u32();
    if (!len) return '';
    let s = '';
    for (let i = 0; i < len; i++)
      s += String.fromCharCode(this.view.getUint16(this.pos + i * 2, true));
    this.pos += (len * 2 + 4) & ~3;
    return s;
  }
  seek(n) { this.pos = n; }
  peek32at(off) { return this.view.getUint32(off, true) >>> 0; }
  peeki32at(off) { return this.view.getInt32(off, true); }
}

class BinWriter {
  constructor() { this.buf = []; }
  u8(v)  { this.buf.push(v & 0xFF); }
  u32(v) { v = v >>> 0; this.buf.push(v & 0xFF, (v >> 8) & 0xFF, (v >> 16) & 0xFF, (v >> 24) & 0xFF); }
  i32(v) { this.u32(v >>> 0); }
  u64(lo, hi) { this.u32(lo); this.u32(hi); }
  fourcc(s) { for (let i = 0; i < 4; i++) this.buf.push((s.charCodeAt(i) || 0) & 0xFF); }
  str(s) {
    if (!s) { this.u32(0); return; }
    this.u32(s.length);
    for (let i = 0; i < s.length; i++) {
      const c = s.charCodeAt(i);
      this.buf.push(c & 0xFF, (c >> 8) & 0xFF);
    }
    const byteLen = s.length * 2;
    const pad = ((byteLen + 4) & ~3) - byteLen;
    for (let i = 0; i < pad; i++) this.buf.push(0);
  }
  bytes(arr) { for (const b of arr) this.buf.push(b); }
  length() { return this.buf.length; }
  toUint8Array() { return new Uint8Array(this.buf); }
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const h8  = n => '0x' + (n >>> 0).toString(16).padStart(8, '0').toUpperCase();
const h64 = (lo, hi) => '0x' + (hi >>> 0).toString(16).padStart(8, '0').toUpperCase()
                            + (lo >>> 0).toString(16).padStart(8, '0').toUpperCase();

function parseHex(s) {
  const n = parseInt(s.trim().replace(/^0x/i, ''), 16);
  return isNaN(n) ? null : (n >>> 0);
}
function parseInt10(s) {
  const n = parseInt(s.trim(), 10);
  return isNaN(n) ? null : n;
}

function decodeIdx(v) {
  v = v >>> 0;
  if ((v & 0x10000000) === 0) return null;
  return v & ~0x10000000;
}
function encodeIdx(idx) {
  if (idx === null || idx === undefined) return 0;
  return ((idx | 0x10000000) >>> 0);
}

function hexDump(data, limit = 512) {
  const bytes = data instanceof Uint8Array ? data : new Uint8Array(data);
  const end = Math.min(bytes.length, limit);
  let out = '';
  for (let i = 0; i < end; i += 16) {
    const row = Array.from(bytes.slice(i, i + 16));
    const off = i.toString(16).padStart(4, '0').toUpperCase();
    const hex = row.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ').padEnd(47);
    const asc = row.map(b => b >= 32 && b < 127 ? String.fromCharCode(b) : '·').join('');
    out += `<span class="hx-offset">${off}</span>  <span class="hx-hex">${hex}</span>  <span class="hx-ascii">${asc}</span>\n`;
  }
  if (bytes.length > limit) out += `<span class="hx-offset">...  ${bytes.length - limit} more bytes</span>\n`;
  return out;
}

function statePropsDesc(v) {
  const f = [];
  if (v & 0x01) f.push('Loop');
  if (v & 0x02) f.push('Persistent');
  if (v & 0x04) f.push('Entry');
  if (v & 0x08) f.push('Exit');
  return f.length ? f.join('|') : 'None';
}

function smPropsDesc(v) {
  const f = [];
  if (v & 0x01) f.push('Public');
  if (v & 0x02) f.push('ExitOnDeath');
  return f.length ? f.join('|') : 'None';
}

// ═══════════════════════════════════════════════════════
// JAZZ PARSER
// ═══════════════════════════════════════════════════════
function parseJazz(buffer) {
  const r = new BinReader(buffer);

  const version = r.u32();
  if (version !== 2 && version !== 3)
    throw new Error(`Unsupported JAZZ version: ${version}. Expected 2 or 3.`);

  const field1 = r.u32();
  if (field1 !== 1)
    throw new Error(`Invalid JAZZ file (field1=${field1}, expected 1)`);

  r.u64(); // field2 = 0 (skip)
  const count = r.u32();

  if (count === 0 || count > 10000)
    throw new Error(`Invalid chunk count: ${count}`);

  // Read chunk ID table
  const infos = [];
  for (let i = 0; i < count; i++) {
    r.seek(20 + i * 16);
    infos.push({
      index:    i,
      instance: r.u64(),
      type:     r.u32(),
      group:    r.u32(),
      offset:   0,
      size:     0,
      fourcc:   '',
      chunkVer: 0,
      rawData:  null,
      fields:   null,
      typeName: '',
      modified: false,
    });
  }

  // Read chunk location table
  const locBase = 20 + count * 16;
  for (let i = 0; i < count; i++) {
    infos[i].offset = r.peeki32at(locBase + i * 8);
    infos[i].size   = r.peeki32at(locBase + i * 8 + 4);
  }

  // Parse headers + raw data
  for (const info of infos) {
    info.typeName = CHUNK_TYPES[info.type] || `Unknown(${h8(info.type)})`;
    const cr = new BinReader(buffer);
    cr.seek(info.offset);
    info.fourcc    = cr.fourcc();
    info.chunkVer  = cr.u32();
    info.dataStart = cr.pos;
    info.rawData   = new Uint8Array(buffer, info.offset, info.size);
  }

  // Parse known chunk fields
  for (const info of infos) {
    try { parseChunkFields(info, infos, buffer); }
    catch (e) { console.warn('Parse error chunk', info.index, info.typeName, e); }
  }

  return { version, count, chunks: infos, filename: '' };
}

function readResKey(r) {
  const lo = r.u32(), hi = r.u32(); // instance (u64)
  const type  = r.u32();
  const group = r.u32();
  return { instance: {lo, hi}, type, group };
}

function resKeyStr(k) {
  return `T:${h8(k.type)} G:${h8(k.group)} I:${h64(k.instance.lo, k.instance.hi)}`;
}

function parseChunkFields(info, all, buffer) {
  const r = new BinReader(buffer);
  r.seek(info.dataStart);

  try {
    if (info.type === 0x02d5df13) {          // ─ StateMachine
      const f = info.fields = {};
      f.name = r.u32();
      const ac = r.i32();
      f.actorDefs = Array.from({length: ac}, () => decodeIdx(r.u32()));
      const pc = r.i32();
      f.paramDefs = Array.from({length: pc}, () => decodeIdx(r.u32()));
      const sc = r.i32();
      f.states    = Array.from({length: sc}, () => decodeIdx(r.u32()));
      const assignC = r.i32();
      f.actorAssignments = Array.from({length: assignC}, () => ({
        animName: r.u32(), animActor: r.u32(), actor: r.u32()
      }));
      f.sentinel   = r.u32();
      f.properties = r.u32();
      f.priority   = r.i32();
      f.unknowns   = Array.from({length: 5}, () => r.u32());

    } else if (info.type === 0x02eedafe) {   // ─ State
      const f = info.fields = {};
      f.stateName       = r.u32();
      f.stateProperties = r.u32();
      f.dgIndex         = decodeIdx(r.u32());
      const tc = r.i32();
      f.transitions = Array.from({length: tc}, () => decodeIdx(r.u32()));
      f.unknowns    = [r.u32()];

    } else if (info.type === 0x02eedb18) {   // ─ DecisionGraph
      const f = info.fields = {};
      f.unknowns = [r.u32()];
      const ac = r.i32();
      f.allNodes  = Array.from({length: ac}, () => decodeIdx(r.u32()));
      const rc = r.i32();
      f.graphRoot = Array.from({length: rc}, () => decodeIdx(r.u32()));
      f.sentinel  = r.u32();

    } else if (info.type === 0x02eedb2f) {   // ─ ActorDefinition (S_AD)
      const f = info.fields = {};
      f.parameterName = r.u32();
      f.defaultValue  = r.u32();

    } else if (info.type === 0x02eedb5f) {   // ─ PlayAnimation
      const f = info.fields = {};
      // Play-specific (LoadSaveAnimChunk)
      f.clip = readResKey(r);
      f.tkMk = readResKey(r);
      const g1Count = r.i32();
      f.playUnk = Array.from({length: 3}, () => r.u32());
      f.group1 = Array.from({length: g1Count}, () => ({ unk1: r.u32(), unk2: r.u32(), actor: r.u32(), slot: r.u32() }));
      const g2Count = r.i32();
      f.group2 = Array.from({length: g2Count}, () => ({ actor: r.u32(), suffix: r.u32() }));
      f.sentinel1 = r.u32();
      f.playUnk2  = Array.from({length: 4}, () => r.u32());
      f.strData   = r.str();
      f.playUnk3  = [r.u32()];
      f.sentinel2 = r.u32();
      // AnimationCommon fields
      f.flags    = r.u32();
      f.priority = r.i32();
      f.animUnk1 = [r.u32()];
      f.blendIn  = r.f32();
      f.animUnk2 = [r.u32(), r.u32(), r.u32()]; // 3 singles
      f.actorIdx = decodeIdx(r.u32());
      f.priority2 = r.i32();
      f.animUnk3  = Array.from({length: 6}, () => r.u32());
      f.sentinel3 = r.u32();
      const ac2 = r.i32();
      f.actions   = Array.from({length: ac2}, () => decodeIdx(r.u32()));

    } else if (info.type === 0x0344d438) {   // ─ Stop (LoadSaveAnimChunk is empty)
      const f = info.fields = {};
      f.flags    = r.u32();
      f.priority = r.i32();
      f.animUnk1 = [r.u32()];
      f.blendIn  = r.f32();
      f.animUnk2 = [r.u32(), r.u32(), r.u32()];
      f.actorIdx = decodeIdx(r.u32());
      f.priority2 = r.i32();
      f.animUnk3  = Array.from({length: 6}, () => r.u32());
      f.sentinel  = r.u32();
      const ac3 = r.i32();
      f.actions   = Array.from({length: ac3}, () => decodeIdx(r.u32()));

    } else if (info.type === 0x02eedb70) {   // ─ Random (Rand)
      const f = info.fields = {};
      const cc = r.i32();
      f.choices = Array.from({length: cc}, () => {
        const weight = r.f32();
        const nc = r.i32();
        const actions = Array.from({length: nc}, () => decodeIdx(r.u32()));
        return { weight, actions };
      });
      f.sentinel = r.u32();
      f.flags    = r.u32();

    } else if (info.type === 0x02eeebdd) {   // ─ Prop
      const f = info.fields = {};
      f.actorIdx  = decodeIdx(r.u32());
      f.propUnk1  = [r.u32()];
      f.catalogRef = readResKey(r);
      f.propUnk2  = Array.from({length: 4}, () => r.u32());
      const pac = r.i32();
      f.actions   = Array.from({length: pac}, () => decodeIdx(r.u32()));

    } else if (info.type === 0x02eeebdc) {   // ─ NextState
      const f = info.fields = {};
      f.stateIdx = decodeIdx(r.u32());

    } else if (info.type === 0x02eeebde) {   // ─ ActorOperation
      const f = info.fields = {};
      f.actorIdx  = decodeIdx(r.u32());
      f.operation = r.u32();
      f.actorIdx2 = decodeIdx(r.u32());
      const nc = r.i32();
      f.actions   = Array.from({length: nc}, () => decodeIdx(r.u32()));

    } else if (info.type === 0x02eedb46) {   // ─ ParameterDefinition
      const f = info.fields = {};
      f.paramName = r.u32();
      f.defaultValue = r.u32();
      // possibly more fields

    } else if (info.type === 0x02eedb92) {   // ─ SelectOnParameter
      const f = info.fields = {};
      f.paramIdx = decodeIdx(r.u32());
      const nc = r.i32();
      f.cases = Array.from({length: nc}, () => {
        const value = r.u32();
        const nc2 = r.i32();
        const actions = Array.from({length: nc2}, () => decodeIdx(r.u32()));
        return { value, actions };
      });
      f.sentinel = r.u32();
    }
  } catch(e) {
    // partial parse is fine, we'll show what we got
  }
}

// ═══════════════════════════════════════════════════════
// JAZZ WRITER
// ═══════════════════════════════════════════════════════
function writeJazz(jazzData, targetVersion) {
  const { chunks, count } = jazzData;
  const ver = targetVersion || jazzData.version;

  // Serialize each chunk body
  const bodies = chunks.map(c => serializeChunkBody(c));

  // Calculate absolute offsets
  const headerBytes = 20 + count * 16 + count * 8;
  const offsets = [];
  let pos = headerBytes;
  for (const b of bodies) { offsets.push(pos); pos += b.length; }

  const w = new BinWriter();

  // File header
  w.u32(ver);
  w.u32(1);
  w.u64(0, 0); // field2 = 0
  w.u32(count);

  // Chunk ID table
  for (const c of chunks) {
    w.u64(c.instance.lo, c.instance.hi);
    w.u32(c.type);
    w.u32(c.group);
  }

  // Chunk location table
  for (let i = 0; i < count; i++) {
    w.i32(offsets[i]);
    w.i32(bodies[i].length);
  }

  // Chunk bodies
  for (const b of bodies) w.bytes(b);

  return w.toUint8Array();
}

function writeResKey(w, k) {
  w.u32(k.instance.lo); w.u32(k.instance.hi);
  w.u32(k.type); w.u32(k.group);
}

function serializeChunkBody(chunk) {
  // Only re-serialize if explicitly modified — otherwise return rawData byte-for-byte
  if (!chunk.fields || !chunk.modified) return chunk.rawData;

  const w = new BinWriter();
  w.fourcc(chunk.fourcc);
  w.u32(chunk.chunkVer);

  if (chunk.type === 0x02d5df13) {
    const f = chunk.fields;
    w.u32(f.name);
    w.i32(f.actorDefs.length); f.actorDefs.forEach(i => w.u32(encodeIdx(i)));
    w.i32(f.paramDefs.length); f.paramDefs.forEach(i => w.u32(encodeIdx(i)));
    w.i32(f.states.length); f.states.forEach(i => w.u32(encodeIdx(i)));
    w.i32(f.actorAssignments.length);
    f.actorAssignments.forEach(a => { w.u32(a.animName); w.u32(a.animActor); w.u32(a.actor); });
    w.u32(0xDEADBEEF);
    w.u32(f.properties); w.i32(f.priority);
    f.unknowns.forEach(u => w.u32(u));

  } else if (chunk.type === 0x02eedafe) {
    const f = chunk.fields;
    w.u32(f.stateName); w.u32(f.stateProperties);
    w.u32(encodeIdx(f.dgIndex));
    w.i32(f.transitions.length); f.transitions.forEach(i => w.u32(encodeIdx(i)));
    f.unknowns.forEach(u => w.u32(u));

  } else if (chunk.type === 0x02eedb18) {
    const f = chunk.fields;
    f.unknowns.forEach(u => w.u32(u));
    w.i32(f.allNodes.length); f.allNodes.forEach(i => w.u32(encodeIdx(i)));
    w.i32(f.graphRoot.length); f.graphRoot.forEach(i => w.u32(encodeIdx(i)));
    w.u32(0xDEADBEEF);

  } else if (chunk.type === 0x02eedb2f) {
    const f = chunk.fields;
    w.u32(f.parameterName); w.u32(f.defaultValue);

  } else if (chunk.type === 0x02eedb5f) {
    const f = chunk.fields;
    writeResKey(w, f.clip); writeResKey(w, f.tkMk);
    w.i32(f.group1.length);
    f.playUnk.forEach(u => w.u32(u));
    f.group1.forEach(g => { w.u32(g.unk1); w.u32(g.unk2); w.u32(g.actor); w.u32(g.slot); });
    w.i32(f.group2.length); f.group2.forEach(g => { w.u32(g.actor); w.u32(g.suffix); });
    w.u32(0xDEADBEEF);
    f.playUnk2.forEach(u => w.u32(u));
    w.str(f.strData);
    f.playUnk3.forEach(u => w.u32(u));
    w.u32(0xDEADBEEF);
    w.u32(f.flags); w.i32(f.priority);
    f.animUnk1.forEach(u => w.u32(u));
    w.u32(Math.fround(f.blendIn) === f.blendIn ? new DataView(new Float32Array([f.blendIn]).buffer).getUint32(0, true) : 0);
    f.animUnk2.forEach(u => w.u32(u));
    w.u32(encodeIdx(f.actorIdx)); w.i32(f.priority2);
    f.animUnk3.forEach(u => w.u32(u));
    w.u32(0xDEADBEEF);
    w.i32(f.actions.length); f.actions.forEach(i => w.u32(encodeIdx(i)));

  } else if (chunk.type === 0x0344d438) {
    const f = chunk.fields;
    w.u32(f.flags); w.i32(f.priority);
    f.animUnk1.forEach(u => w.u32(u));
    w.u32(new DataView(new Float32Array([f.blendIn]).buffer).getUint32(0, true));
    f.animUnk2.forEach(u => w.u32(u));
    w.u32(encodeIdx(f.actorIdx)); w.i32(f.priority2);
    f.animUnk3.forEach(u => w.u32(u));
    w.u32(0xDEADBEEF);
    w.i32(f.actions.length); f.actions.forEach(i => w.u32(encodeIdx(i)));

  } else if (chunk.type === 0x02eedb70) {
    const f = chunk.fields;
    w.i32(f.choices.length);
    f.choices.forEach(c => {
      w.u32(new DataView(new Float32Array([c.weight]).buffer).getUint32(0, true));
      w.i32(c.actions.length); c.actions.forEach(i => w.u32(encodeIdx(i)));
    });
    w.u32(0xDEADBEEF);
    w.u32(f.flags);

  } else if (chunk.type === 0x02eeebdd) {
    const f = chunk.fields;
    w.u32(encodeIdx(f.actorIdx));
    f.propUnk1.forEach(u => w.u32(u));
    writeResKey(w, f.catalogRef);
    f.propUnk2.forEach(u => w.u32(u));
    w.i32(f.actions.length); f.actions.forEach(i => w.u32(encodeIdx(i)));

  } else if (chunk.type === 0x02eeebdc) {
    const f = chunk.fields;
    w.u32(encodeIdx(f.stateIdx));

  } else if (chunk.type === 0x02eeebde) {
    const f = chunk.fields;
    w.u32(encodeIdx(f.actorIdx)); w.u32(f.operation); w.u32(encodeIdx(f.actorIdx2));
    w.i32(f.actions.length); f.actions.forEach(i => w.u32(encodeIdx(i)));

  } else if (chunk.type === 0x02eedb46) {
    const f = chunk.fields;
    w.u32(f.paramName); w.u32(f.defaultValue);

  } else {
    return chunk.rawData;
  }

  const arr = w.toUint8Array();
  // Always trust the re-serialized result for modified chunks.
  // Size CAN legitimately change when nodes are added/deleted — never fall back to stale rawData.
  chunk.rawData = arr; // keep rawData in sync for future reference
  return arr;
}

// ═══════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════
let state = {
  jazz:     null,
  filename: '',
  selIdx:   null,
};

function getChunk(idx) {
  if (idx === null || !state.jazz) return null;
  return state.jazz.chunks[idx] || null;
}

// ═══════════════════════════════════════════════════════
// UI: TREE
// ═══════════════════════════════════════════════════════
function getChunkLabel(chunk) {
  if (!chunk) return '?';
  if (chunk.type === 0x02d5df13 && chunk.fields)
    return h8(chunk.fields.name);
  if (chunk.type === 0x02eedafe && chunk.fields)
    return h8(chunk.fields.stateName);
  if (chunk.type === 0x02eedb18 && chunk.fields)
    return `(${chunk.fields.graphRoot.length} root)`;
  return `#${chunk.index}`;
}

function getChunkChildren(chunk) {
  if (!chunk || !chunk.fields) return [];
  const f = chunk.fields;

  if (chunk.type === 0x02d5df13) // StateMachine → actors, params, states
    return [...(f.actorDefs||[]), ...(f.paramDefs||[]), ...(f.states||[])].filter(i => i !== null);

  if (chunk.type === 0x02eedafe) { // State → DG only (transitions are links, not tree children)
    if (f.dgIndex !== null && f.dgIndex !== undefined) return [f.dgIndex];
    return [];
  }

  if (chunk.type === 0x02eedb18) // DecisionGraph → all nodes
    return (f.allNodes||[]).filter(i => i !== null);

  // Random: choices' actions
  if (chunk.type === 0x02eedb70) {
    const kids = [];
    (f.choices||[]).forEach(c => (c.actions||[]).forEach(i => { if (i !== null) kids.push(i); }));
    return kids;
  }

  // NextState → do NOT recurse into target state (would cause duplicates in tree)
  // Prop / ActorOp / other action nodes with child actions
  if (f.actions) return (f.actions||[]).filter(i => i !== null);

  return [];
}

function buildTreeItem(chunkIdx, depth, expanded) {
  const chunk = getChunk(chunkIdx);
  if (!chunk) return null;

  const icon      = CHUNK_ICONS[chunk.typeName] || '📦';
  const colorCls  = CHUNK_COLOR_CLASS[chunk.typeName] || '';
  const label     = getChunkLabel(chunk);
  const children  = getChunkChildren(chunk);
  const hasKids   = children.length > 0;
  const isExp     = expanded.has(chunkIdx);
  const isSel     = state.selIdx === chunkIdx;

  const nodeDiv   = document.createElement('div');
  nodeDiv.className = 'tree-node';

  const row = document.createElement('div');
  row.className = 'tree-item' + (isSel ? ' selected' : '');
  row.dataset.idx = chunkIdx;

  const tog = document.createElement('span');
  tog.className = 'tree-toggle';
  tog.textContent = hasKids ? (isExp ? '▼' : '▶') : ' ';

  const ico = document.createElement('span');
  ico.className = 'tree-icon';
  ico.textContent = icon;

  const lbl = document.createElement('span');
  lbl.className = `tree-label ${colorCls}`;
  lbl.innerHTML = `<span class="tl-type">${chunk.typeName}</span> <span class="tl-name">${label}</span>`;

  row.appendChild(tog);
  row.appendChild(ico);
  row.appendChild(lbl);
  nodeDiv.appendChild(row);

  row.addEventListener('click', e => {
    e.stopPropagation();
    state.selIdx = chunkIdx;
    if (hasKids) {
      if (expanded.has(chunkIdx)) expanded.delete(chunkIdx);
      else expanded.add(chunkIdx);
    }
    renderTree();
    renderProps();
  });

  if (hasKids && isExp) {
    const childDiv = document.createElement('div');
    childDiv.className = 'tree-children';
    children.forEach(ci => {
      const ch = buildTreeItem(ci, depth + 1, expanded);
      if (ch) childDiv.appendChild(ch);
    });
    nodeDiv.appendChild(childDiv);
  }

  return nodeDiv;
}

const treeExpanded = new Set();

function renderTree() {
  const body = document.getElementById('tree-body');
  body.innerHTML = '';

  if (!state.jazz) {
    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.id = 'dropZone';
    dz.innerHTML = `<div class="dz-icon">🎭</div><div class="dz-title">Open or Drop File</div><div class="dz-sub">.jazz (v2 &amp; v3)</div>`;
    body.appendChild(dz);
    setupDropZone();
    return;
  }

  // Auto-expand StateMachine on first load
  if (treeExpanded.size === 0 && state.jazz.chunks.length > 0) {
    treeExpanded.add(0);
  }

  const rootEl = buildTreeItem(0, 0, treeExpanded);
  if (rootEl) body.appendChild(rootEl);
}

// ═══════════════════════════════════════════════════════
// UI: PROPS PANEL
// ═══════════════════════════════════════════════════════
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function section(title, colorVar) {
  const s = document.createElement('div');
  s.className = 'prop-section';
  const h = document.createElement('div');
  h.className = 'prop-section-header';
  h.style.color = colorVar || '';
  h.textContent = title;
  s.appendChild(h);
  const b = document.createElement('div');
  b.className = 'prop-section-body';
  s.appendChild(b);
  return { section: s, body: b };
}

function propRow(label, value, onChange, hint, readOnly) {
  const row = document.createElement('div');
  row.className = 'prop-row';

  const lbl = el('span', 'prop-label', label);
  row.appendChild(lbl);

  const valDiv = el('div', 'prop-value');
  const inp = document.createElement('input');
  inp.className = 'prop-input' + (readOnly ? ' readonly' : '');
  inp.type = 'text';
  inp.value = value;
  if (readOnly) inp.readOnly = true;
  if (onChange) {
    inp.addEventListener('change', e => {
      const ok = onChange(e.target.value);
      inp.classList.toggle('modified', ok === true);
    });
  }
  valDiv.appendChild(inp);

  if (hint) {
    const h = el('span', 'prop-hint', hint);
    valDiv.appendChild(h);
  }

  row.appendChild(valDiv);
  return { row, input: inp };
}

function linkItem(icon, label, sublabel, onClick) {
  const d = el('div', 'link-item');
  d.innerHTML = `<span class="li-icon">${icon}</span><span class="li-label">${label}</span><span class="li-idx">${sublabel || ''}</span>`;
  if (onClick) d.addEventListener('click', onClick);
  return d;
}

// linkItem with a ✕ delete button on the right
function linkItemDel(icon, label, sublabel, onClick, onDelete) {
  const d = el('div', 'link-item');
  d.innerHTML = `<span class="li-icon">${icon}</span><span class="li-label">${label}</span><span class="li-idx">${sublabel || ''}</span>`;
  if (onDelete) {
    const delBtn = el('span', 'li-del', '✕');
    delBtn.title = 'Delete / remove';
    delBtn.addEventListener('click', e => { e.stopPropagation(); onDelete(); });
    d.appendChild(delBtn);
  }
  if (onClick) d.addEventListener('click', onClick);
  return d;
}

function renderProps() {
  const panel = document.getElementById('props-panel');
  panel.innerHTML = '';

  if (!state.jazz) {
    panel.innerHTML = `<div class="empty-state"><div class="es-icon">🎵</div><div class="es-title">No File Loaded</div><div class="es-sub">Open a .jazz file to begin editing</div></div>`;
    return;
  }

  if (state.selIdx === null) {
    panel.innerHTML = `<div class="empty-state"><div class="es-icon">←</div><div class="es-title">Select an item</div><div class="es-sub">Click something in the tree</div></div>`;
    return;
  }

  const chunk = getChunk(state.selIdx);
  if (!chunk) return;

  // Chunk info bar
  const infobar = el('div', 'chunk-infobar');
  infobar.innerHTML = `
    <span class="ci-item">Index: <b>${chunk.index}</b></span>
    <span class="ci-item">Type: <b>${h8(chunk.type)}</b></span>
    <span class="ci-item">FourCC: <b>"${chunk.fourcc}"</b></span>
    <span class="ci-item">Ver: <b>${h8(chunk.chunkVer)}</b></span>
    <span class="ci-item">Size: <b>${chunk.rawData.length} B</b></span>
    <span class="ci-item">Instance: <b>${h64(chunk.instance.lo, chunk.instance.hi)}</b></span>
  `;
  // Clone button in infobar
  const cloneBtn = el('button', 'btn-action btn-add', '⧉ Clone');
  cloneBtn.style.cssText = 'margin-left:auto; padding:3px 10px; font-size:11px; flex-shrink:0;';
  cloneBtn.title = 'Duplicate this chunk as a new unlinked chunk';
  cloneBtn.onclick = () => {
    const newIdx = cloneChunk(state.selIdx);
    state.selIdx = newIdx;
    notify(`Cloned → new chunk #${newIdx}`);
    renderTree(); renderProps();
  };
  infobar.appendChild(cloneBtn);
  panel.appendChild(infobar);

  if (chunk.type === 0x02d5df13) renderStateMachineProps(panel, chunk);
  else if (chunk.type === 0x02eedafe) renderStateProps(panel, chunk);
  else if (chunk.type === 0x02eedb18) renderDGProps(panel, chunk);
  else if (chunk.type === 0x02eedb2f) renderActorDefProps(panel, chunk);
  else if (chunk.type === 0x02eedb46) renderParamDefProps(panel, chunk);
  else if (chunk.type === 0x02eedb5f) renderPlayProps(panel, chunk);
  else if (chunk.type === 0x0344d438) renderStopProps(panel, chunk);
  else if (chunk.type === 0x02eedb70) renderRandomProps(panel, chunk);
  else if (chunk.type === 0x02eeebdd) renderPropProps(panel, chunk);
  else if (chunk.type === 0x02eeebdc) renderNextStateProps(panel, chunk);
  else if (chunk.type === 0x02eeebde) renderActorOpProps(panel, chunk);
  else if (chunk.type === 0x02eedb92) renderSelectOnParamProps(panel, chunk);
  else renderGenericProps(panel, chunk);
}

function renderStateMachineProps(panel, chunk) {
  const f = chunk.fields;
  const all = state.jazz.chunks;

  // Stats
  const { section: ss, body: sb } = section('📊 Overview', 'var(--sm-color)');
  const stats = el('div', 'stats-strip');
  stats.innerHTML = `
    <div class="stat"><span class="sv">${f.states.length}</span><span class="sk">States</span></div>
    <div class="stat"><span class="sv">${f.actorDefs.length}</span><span class="sk">Actors</span></div>
    <div class="stat"><span class="sv">${f.paramDefs.length}</span><span class="sk">Params</span></div>
    <div class="stat"><span class="sv">${f.actorAssignments.length}</span><span class="sk">Assignments</span></div>
    <div class="stat"><span class="sv">${f.sentinelOk ? '✅' : '❌'}</span><span class="sk">Sentinel</span></div>
  `;
  sb.appendChild(stats);
  panel.appendChild(ss);

  // Editable fields
  const { section: ps, body: pb } = section('⚙ Properties', 'var(--sm-color)');

  // Instance ID (64-bit) — affects AcquireStateMachine lookup
  const instHex = h64(chunk.instance.lo, chunk.instance.hi);
  const instRow = propRow('Instance ID (64-bit)', instHex, v => {
    const s = v.trim().replace(/^0x/i,'').padStart(16,'0');
    const hi = parseInt(s.slice(0,8),16);
    const lo = parseInt(s.slice(8,16),16);
    if (isNaN(hi)||isNaN(lo)) return;
    chunk.instance = {lo: lo>>>0, hi: hi>>>0};
    chunk.modified = true; return true;
  }, 'used by AcquireStateMachine()');
  pb.appendChild(instRow.row);

  const nameRow = propRow('Name Hash', h8(f.name), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.name = n; chunk.modified = true; return true;
  }, 'uint32 hash');
  pb.appendChild(nameRow.row);

  const propsRow = propRow('SM Properties', h8(f.properties), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.properties = n; chunk.modified = true; return true;
  }, smPropsDesc(f.properties));
  pb.appendChild(propsRow.row);
  // Update hint on change
  propsRow.input.addEventListener('input', e => {
    const n = parseHex(e.target.value);
    if (n !== null) propsRow.row.querySelector('.prop-hint').textContent = smPropsDesc(n);
  });

  const prioRow = propRow('Priority', f.priority.toString(), v => {
    const n = parseInt10(v);
    if (n === null) return;
    f.priority = n; chunk.modified = true; return true;
  }, 'int32 (default: 10000)');
  pb.appendChild(prioRow.row);

  f.unknowns.forEach((u, i) => {
    const def = i === 0 ? '(default: 2)' : '(default: 0)';
    const r = propRow(`Unknown[${i}]`, h8(u), v => {
      const n = parseHex(v);
      if (n === null) return;
      f.unknowns[i] = n; chunk.modified = true; return true;
    }, def);
    pb.appendChild(r.row);
  });

  panel.appendChild(ps);

  // States list — sortable
  const { section: sts, body: stb } = section(`📌 States (${f.states.length}) — drag to reorder`);
  if (f.states.length === 0) {
    stb.appendChild(el('div', 'no-items', 'No states'));
  } else {
    const stateItems = f.states
      .map((idx) => ({ idx }))
      .filter(({ idx }) => idx !== null && all[idx])
      .map(({ idx }) => {
        const sc = all[idx];
        const nameHash = sc.fields ? h8(sc.fields.stateName) : '?';
        return {
          icon: '📌', label: `State ${nameHash}`, sub: `#${idx}`,
          onNav:    () => { state.selIdx = idx; treeExpanded.add(idx); renderTree(); renderProps(); },
          onDelete: () => {
            removeStateFromSM(chunk, idx);
            notify(`Removed State #${idx} from StateMachine`);
            renderTree(); renderProps();
          },
        };
      });
    stb.appendChild(makeSortableList(f.states, stateItems, () => { chunk.modified = true; }));
  }
  const smBar = el('div', 'action-bar');
  const btnAddState = el('button', 'btn-action btn-add', '✚ Add New State');
  btnAddState.onclick = () => uiAddStateToSM();
  smBar.appendChild(btnAddState);
  sts.appendChild(smBar);
  panel.appendChild(sts);

  // Actors
  if (f.actorDefs.length > 0) {
    const { section: as, body: ab } = section(`🎪 Actor Definitions (${f.actorDefs.length})`);
    f.actorDefs.forEach(idx => {
      if (idx === null) return;
      const ac = all[idx];
      ab.appendChild(linkItem('🎪', ac ? ac.typeName : '?', `#${idx}`, () => {
        state.selIdx = idx; renderTree(); renderProps();
      }));
    });
    panel.appendChild(as);
  }

  // Param defs
  if (f.paramDefs.length > 0) {
    const { section: ps2, body: pb2 } = section(`⚙ Parameter Definitions (${f.paramDefs.length})`);
    f.paramDefs.forEach(idx => {
      if (idx === null) return;
      const pc = all[idx];
      pb2.appendChild(linkItem('⚙', pc ? pc.typeName : '?', `#${idx}`, () => {
        state.selIdx = idx; renderTree(); renderProps();
      }));
    });
    panel.appendChild(ps2);
  }

  // Actor assignments
  if (f.actorAssignments.length > 0) {
    const { section: aas, body: aab } = section(`🎯 Actor Assignments (${f.actorAssignments.length})`);
    f.actorAssignments.forEach((a, i) => {
      const row = el('div', 'prop-row');
      row.innerHTML = `
        <span class="prop-label">Assign [${i}]</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)">
          AnimName:<b style="color:var(--text)">${h8(a.animName)}</b>
          &nbsp;AnimActor:<b style="color:var(--text)">${h8(a.animActor)}</b>
          &nbsp;Actor:<b style="color:var(--text)">${h8(a.actor)}</b>
        </span>
      `;
      aab.appendChild(row);
    });
    panel.appendChild(aas);
  }
}

function renderStateProps(panel, chunk) {
  const f = chunk.fields;
  const all = state.jazz.chunks;
  const chunkIdx = chunk.index;

  const { section: ps, body: pb } = section('📌 State Properties', 'var(--state-color)');

  const nameRow = propRow('State Name Hash', h8(f.stateName), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.stateName = n; chunk.modified = true;
    renderTree(); return true;
  }, 'uint32 hash');
  pb.appendChild(nameRow.row);

  const spropsRow = propRow('State Properties', h8(f.stateProperties), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.stateProperties = n; chunk.modified = true; return true;
  }, statePropsDesc(f.stateProperties));
  pb.appendChild(spropsRow.row);
  spropsRow.input.addEventListener('input', e => {
    const n = parseHex(e.target.value);
    if (n !== null) spropsRow.row.querySelector('.prop-hint').textContent = statePropsDesc(n);
  });

  const unkRow = propRow('Unknown[0]', h8(f.unknowns[0]), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.unknowns[0] = n; chunk.modified = true; return true;
  }, '(default: 0x00000006)');
  pb.appendChild(unkRow.row);

  // State-level action bar
  const bar = el('div', 'action-bar');
  const btnDelState = el('button', 'btn-action btn-delete', '🗑 Delete this State');
  btnDelState.title = 'Remove state from StateMachine and delete its chunk';
  btnDelState.onclick = () => {
    // Remove from SM first
    const sm = state.jazz.chunks[0];
    if (sm && sm.fields) removeStateFromSM(sm, chunkIdx);
    deleteChunk(chunkIdx);
  };
  bar.appendChild(btnDelState);
  ps.appendChild(bar);
  panel.appendChild(ps);

  // Decision Graph
  const { section: dgs, body: dgb } = section('🔀 Decision Graph', 'var(--dg-color)');
  if (f.dgIndex !== null) {
    const dgIdx = f.dgIndex;
    const dgc = all[dgIdx];
    const nodeCount = dgc?.fields?.allNodes.length ?? '?';
    const rootCount = dgc?.fields?.graphRoot.length ?? '?';
    const li = linkItemDel(
      '🔀',
      `DecisionGraph  (${nodeCount} nodes, ${rootCount} roots)`,
      `#${dgIdx}`,
      () => { state.selIdx = dgIdx; treeExpanded.add(dgIdx); renderTree(); renderProps(); }
    );
    dgb.appendChild(li);

    const dgBar = el('div', 'action-bar');

    const btnDetach = el('button', 'btn-action btn-detach', '⚡ Detach DG only');
    btnDetach.title = 'Remove DG reference from state (chunk stays in file)';
    btnDetach.onclick = () => detachDGFromState(chunk);
    dgBar.appendChild(btnDetach);

    const btnDelDG = el('button', 'btn-action btn-delete', '🗑 Delete DG + all nodes');
    btnDelDG.title = 'Delete the DecisionGraph and all its Play/Stop/etc nodes';
    btnDelDG.onclick = () => {
      f.dgIndex = null;
      chunk.modified = true;
      deleteChunkWithChildren(dgIdx);
    };
    dgBar.appendChild(btnDelDG);
    dgs.appendChild(dgBar);
  } else {
    dgb.appendChild(el('div', 'no-items', 'No decision graph'));
  }
  panel.appendChild(dgs);

  // Transitions — sortable
  const { section: trs, body: trb } = section(`➡ Transitions (${f.transitions.length}) — drag to reorder`, 'var(--state-color)');
  if (f.transitions.length === 0) {
    trb.appendChild(el('div', 'no-items', 'Terminal state (no transitions)'));
  } else {
    const transItems = f.transitions
      .map(idx => ({ idx }))
      .filter(({ idx }) => idx !== null)
      .map(({ idx }) => {
        const tc = all[idx];
        const nameHash = tc?.fields ? h8(tc.fields.stateName) : '?';
        return {
          icon: '➡', label: `State ${nameHash}`, sub: `#${idx}`,
          onNav:    () => { state.selIdx = idx; treeExpanded.add(idx); renderTree(); renderProps(); },
          onDelete: () => {
            removeTransitionFromState(chunk, idx);
            notify(`Removed transition → State #${idx}`);
            renderTree(); renderProps();
          },
        };
      });
    trb.appendChild(makeSortableList(f.transitions, transItems, () => { chunk.modified = true; }));
  }
  const transBar = el('div', 'action-bar');
  const btnAddTrans = el('button', 'btn-action btn-add', '✚ Add Transition');
  btnAddTrans.onclick = () => uiAddTransition(chunk);
  transBar.appendChild(btnAddTrans);
  trs.appendChild(transBar);
  panel.appendChild(trs);
}

function renderDGProps(panel, chunk) {
  const f = chunk.fields;
  const all = state.jazz.chunks;

  const { section: ps, body: pb } = section('🔀 Decision Graph', 'var(--dg-color)');
  const r1 = propRow('Unknown[0]', h8(f.unknowns[0]), v => {
    const n = parseHex(v);
    if (n === null) return;
    f.unknowns[0] = n; chunk.modified = true; return true;
  });
  pb.appendChild(r1.row);
  pb.appendChild(propRow('Sentinel', f.sentinel === 0xDEADBEEF ? '✅ 0xDEADBEEF' : `❌ ${h8(f.sentinel)}`, null, '', true).row);
  panel.appendChild(ps);

  // Root nodes
  const { section: rs, body: rb } = section(`▶ Root Nodes (${f.graphRoot.length})`, 'var(--node-color)');
  f.graphRoot.forEach((idx, i) => {
    if (idx === null) return;
    const nc = all[idx];
    const icon = CHUNK_ICONS[nc?.typeName] || '📦';
    const li = linkItemDel(
      icon, `${nc?.typeName || '?'}  [root ${i}]`, `#${idx}`,
      () => { state.selIdx = idx; renderTree(); renderProps(); },
      () => {
        f.graphRoot = f.graphRoot.filter(x => x !== idx);
        chunk.modified = true;
        notify(`Removed root node #${idx} from DecisionGraph`);
        renderTree(); renderProps();
      }
    );
    rb.appendChild(li);
  });
  if (f.graphRoot.length === 0) rb.appendChild(el('div', 'no-items', 'No root nodes'));
  panel.appendChild(rs);

  // All nodes — sortable, with move + delete per node
  const { section: as, body: ab } = section(`📋 All Nodes (${f.allNodes.length}) — drag to reorder`, 'var(--node-color)');

  if (f.allNodes.length === 0) {
    ab.appendChild(el('div', 'no-items', 'No nodes'));
  } else {
    const sortItems = f.allNodes
      .map((idx, i) => ({ idx, i }))
      .filter(({ idx }) => idx !== null)
      .map(({ idx }) => {
        const nc = all[idx];
        const icon = CHUNK_ICONS[nc?.typeName] || '📦';
        let sub = `#${idx}`;
        if (nc?.type === 0x02eedb5f && nc.fields?.clip)
          sub += '  ' + h64(nc.fields.clip.instance.lo, nc.fields.clip.instance.hi);
        return {
          icon, label: nc?.typeName || '?', sub,
          onNav:   () => { state.selIdx = idx; renderTree(); renderProps(); },
          onMove:  () => uiMoveNodeToDG(chunk, idx),
          onDelete: () => confirmModal(
            `🗑 Delete Node`,
            `Delete ${nc?.typeName || '?'} #${idx} and remove from this DecisionGraph?`,
            '🗑 Delete',
            () => { removeNodeFromDG(chunk, idx); deleteChunk(idx); }
          ),
        };
      });

    const sortList = makeSortableList(f.allNodes, sortItems, () => { chunk.modified = true; });
    ab.appendChild(sortList);
  }

  // Bulk action bar
  const bulkBar = el('div', 'action-bar');

  const btnAddNode = el('button', 'btn-action btn-add', '✚ New Node');
  btnAddNode.onclick = () => uiAddNodeToDG(chunk);
  bulkBar.appendChild(btnAddNode);

  const btnAssign = el('button', 'btn-action btn-add', '📎 Assign Existing');
  btnAssign.title = 'Add an existing chunk from the file to this DG (no copy)';
  btnAssign.onclick = () => uiAssignChunkToDG(chunk);
  bulkBar.appendChild(btnAssign);

  const btnDelAll = el('button', 'btn-action btn-delete', '🗑 Delete ALL');
  btnDelAll.title = 'Delete all nodes from file';
  btnDelAll.onclick = () => {
    const nodesCopy = [...f.allNodes].filter(i => i !== null);
    if (!nodesCopy.length) return;
    confirmModal(
      '🗑 Delete All Nodes',
      `Delete all ${nodesCopy.length} node(s) from this DecisionGraph and from the file?`,
      '🗑 Delete All',
      () => {
        f.graphRoot = []; f.allNodes = [];
        chunk.modified = true;
        const sorted = nodesCopy.sort((a, b) => b - a);
        for (const idx of sorted) {
          state.jazz.chunks.splice(idx, 1);
          state.jazz.count--;
          updateAllRefsAfterDelete(idx);
        }
        notify(`Deleted ${sorted.length} nodes`);
        renderTree(); renderProps();
      }
    );
  };
  bulkBar.appendChild(btnDelAll);
  as.appendChild(bulkBar);
  panel.appendChild(as);
}

function renderSelectOnParamProps(panel, chunk) {
  const f = chunk.fields;
  const all = state.jazz.chunks;
  if (!f) { renderGenericProps(panel, chunk); return; }

  const { section: ps, body: pb } = section('🔧 SelectOnParameter', 'var(--actor-color)');

  // Parameter ref
  const paramRow = el('div', 'prop-row');
  paramRow.innerHTML = '<span class="prop-label">Parameter</span>';
  const pv = el('div', 'prop-value');
  if (f.paramIdx !== null && all[f.paramIdx]) {
    pv.appendChild(linkItem('⚙', `ParamDef #${f.paramIdx}`, h8(all[f.paramIdx].fields?.paramName||0), () => {
      state.selIdx = f.paramIdx; renderTree(); renderProps();
    }));
  } else {
    pv.appendChild(el('span', 'prop-hint', '(none)'));
  }
  paramRow.appendChild(pv);
  pb.appendChild(paramRow);
  panel.appendChild(ps);

  // Cases
  (f.cases||[]).forEach((cas, ci) => {
    const { section: cs, body: cb } = section(`📋 Case ${ci} — value: ${h8(cas.value)}`);

    const vr = propRow('Match Value', h8(cas.value), v => {
      const n = parseHex(v); if (n === null) return;
      pushUndo(`Edit Case ${ci} value`);
      cas.value = n; chunk.modified = true; return true;
    }, 'uint32');
    cb.appendChild(vr.row);

    // Actions for this case
    if (cas.actions?.length) {
      const actTitle = el('div', 'prop-hint', `Actions (${cas.actions.length}):`);
      actTitle.style.marginTop = '6px';
      cb.appendChild(actTitle);
      cas.actions.forEach(idx => {
        if (idx === null) return;
        const nc = all[idx];
        const icon = CHUNK_ICONS[nc?.typeName] || '📦';
        cb.appendChild(linkItemDel(
          icon, nc?.typeName||'?', `#${idx}`,
          () => { state.selIdx = idx; renderTree(); renderProps(); },
          () => {
            pushUndo('Remove action from case');
            cas.actions = cas.actions.filter(i => i !== idx);
            chunk.modified = true;
            renderProps();
          }
        ));
      });
    }

    // Add action to case button
    const cBar = el('div', 'action-bar');
    const btnAdd = el('button', 'btn-action btn-add', '✚ Add Action');
    btnAdd.onclick = () => {
      const actionTypes = [0x02eedb5f, 0x0344d438, 0x02eedb70, 0x02eeebdc, 0x02eeebde];
      const items = all
        .filter(c => actionTypes.includes(c.type))
        .map(c => ({ icon: CHUNK_ICONS[c.typeName]||'📦', tag: c.typeName, label: c.typeName, sub: `#${c.index}`, value: c.index }));
      showPicker('Add action to case', items, idx => {
        pushUndo('Add action to case');
        if (!cas.actions) cas.actions = [];
        cas.actions.push(idx);
        chunk.modified = true;
        renderProps();
      });
    };
    cBar.appendChild(btnAdd);

    const btnDel = el('button', 'btn-action btn-delete', '🗑 Remove Case');
    btnDel.onclick = () => confirmModal('Remove Case', `Remove case ${ci} (value ${h8(cas.value)})?`, 'Remove', () => {
      f.cases.splice(ci, 1); chunk.modified = true; renderProps();
    });
    cBar.appendChild(btnDel);
    cs.appendChild(cBar);
    panel.appendChild(cs);
  });

  // Add new case button
  const topBar = el('div', 'action-bar');
  const btnAddCase = el('button', 'btn-action btn-add', '✚ Add Case');
  btnAddCase.onclick = () => {
    showForm('Add Case', '✚ Add', [
      { id:'val', label:'Match Value (hex)', type:'text', value:'0x00000000', placeholder:'0x00000001' },
    ], vals => {
      const n = parseHex(vals.val);
      if (n === null) { alert('Invalid value'); return false; }
      pushUndo('Add SelectOnParam case');
      if (!f.cases) f.cases = [];
      f.cases.push({ value: n, actions: [] });
      chunk.modified = true;
      renderProps();
    });
  };
  topBar.appendChild(btnAddCase);
  panel.appendChild(topBar);
  appendHexSection(panel, chunk);
}

function renderGenericProps(panel, chunk) {
  const { section: ps, body: pb } = section('📦 Editable Fields (uint32)');

  // Show all uint32 fields after FourCC+version as editable
  const dataStart = 8; // FourCC(4) + version(4)
  const dv = new DataView(chunk.rawData.buffer, chunk.rawData.byteOffset, chunk.rawData.byteLength);
  const fieldCount = Math.min(Math.floor((chunk.rawData.length - dataStart) / 4), 64);

  for (let i = 0; i < fieldCount; i++) {
    const byteOff = dataStart + i * 4;
    const val = dv.getUint32(byteOff, true);
    const row = propRow(`[+${byteOff.toString(16).padStart(2,'0')}] field[${i}]`, h8(val), v => {
      const n = parseHex(v);
      if (n === null) return;
      dv.setUint32(byteOff, n, true);
      chunk.modified = true;
      return true;
    });
    pb.appendChild(row.row);
  }

  if (fieldCount === 0) pb.appendChild(el('div', 'no-items', 'No fields'));
  panel.appendChild(ps);

  // Hex dump
  const { section: hs, body: hb } = section('🔍 Hex Dump');
  const hexDiv = el('div', 'hex-view');
  hexDiv.innerHTML = hexDump(chunk.rawData);
  hb.appendChild(hexDiv);
  panel.appendChild(hs);
}

// ─── Confirm modal ───────────────────────────────────
function confirmModal(title, msg, confirmLabel, onConfirm) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').innerHTML = msg;
  const confirmBtn = document.getElementById('modal-confirm');
  confirmBtn.textContent = confirmLabel;
  overlay.classList.add('active');
  const close = () => overlay.classList.remove('active');
  const handler = () => { close(); onConfirm(); };
  confirmBtn.onclick = handler;
  document.getElementById('modal-cancel').onclick = close;
  overlay.onclick = e => { if (e.target === overlay) close(); };
}

// ─── Update all index refs after deletion ────────────
function updateIdxRef(i, deletedIdx) {
  if (i === null || i === undefined) return null;
  if (i === deletedIdx) return null;
  if (i > deletedIdx) return i - 1;
  return i;
}

function updateAllRefsAfterDelete(deletedIdx) {
  const chunks = state.jazz.chunks;
  for (const c of chunks) {
    if (!c.fields) continue;
    c.modified = true; // ref indices changed → must re-serialize
    const f = c.fields;

    // StateMachine
    if (f.actorDefs)  f.actorDefs  = f.actorDefs.map(i => updateIdxRef(i, deletedIdx));
    if (f.paramDefs)  f.paramDefs  = f.paramDefs.map(i => updateIdxRef(i, deletedIdx));
    if (f.states)     f.states     = f.states.map(i => updateIdxRef(i, deletedIdx));
    // State
    if ('dgIndex' in f)   f.dgIndex    = updateIdxRef(f.dgIndex, deletedIdx);
    if (f.transitions)    f.transitions = f.transitions.map(i => updateIdxRef(i, deletedIdx));
    // DecisionGraph
    if (f.allNodes)   f.allNodes   = f.allNodes.map(i => updateIdxRef(i, deletedIdx));
    if (f.graphRoot)  f.graphRoot  = f.graphRoot.map(i => updateIdxRef(i, deletedIdx));
    // Animation nodes
    if (f.actions)    f.actions    = f.actions.map(i => updateIdxRef(i, deletedIdx));
    if ('actorIdx' in f)  f.actorIdx  = updateIdxRef(f.actorIdx, deletedIdx);
    if ('actorIdx2' in f) f.actorIdx2 = updateIdxRef(f.actorIdx2, deletedIdx);
    if ('stateIdx' in f)  f.stateIdx  = updateIdxRef(f.stateIdx, deletedIdx);
    // Random choices
    if (f.choices) f.choices.forEach(c => { c.actions = c.actions.map(i => updateIdxRef(i, deletedIdx)); });
  }
  // Update selIdx
  if (state.selIdx === deletedIdx) state.selIdx = null;
  else if (state.selIdx > deletedIdx) state.selIdx--;
  // Update treeExpanded
  const newExp = new Set();
  for (const idx of treeExpanded) {
    if (idx === deletedIdx) continue;
    newExp.add(idx > deletedIdx ? idx - 1 : idx);
  }
  treeExpanded.clear();
  for (const i of newExp) treeExpanded.add(i);
}

// ─── Delete a chunk entirely from the file ───────────
function deleteChunk(idx) {
  const chunk = state.jazz.chunks[idx];
  const name = `${chunk.typeName} #${idx}`;
  confirmModal(
    '🗑 Delete Chunk',
    `Delete <b>${name}</b> from the file?<br><br>All references to this chunk will be nulled. This cannot be undone.`,
    '🗑 Delete',
    () => {
      state.jazz.chunks.splice(idx, 1);
      state.jazz.count--;
      updateAllRefsAfterDelete(idx);
      notify(`Deleted: ${name}`);
      renderTree();
      renderProps();
    }
  );
}

// ─── Delete a chunk AND all chunks it references (recursive) ───
function deleteChunkDeep(idx, visited = new Set()) {
  if (visited.has(idx)) return;
  visited.add(idx);
  const chunk = state.jazz.chunks[idx];
  if (!chunk) return;
  const f = chunk.fields;
  if (f) {
    // Collect children to delete first
    const children = [];
    if (chunk.type === 0x02eedb18) { // DecisionGraph → delete all nodes
      (f.allNodes || []).forEach(i => { if (i !== null) children.push(i); });
    }
    if (f.actions) f.actions.forEach(i => { if (i !== null) children.push(i); });
    if (f.choices) f.choices.forEach(c => c.actions.forEach(i => { if (i !== null) children.push(i); }));
    // Delete children first (in reverse order to preserve indices)
    children.sort((a, b) => b - a);
    for (const ci of children) deleteChunkDeep(ci, visited);
  }
}

function deleteChunkWithChildren(rootIdx) {
  // Collect all chunks to delete
  const toDelete = new Set();
  function collect(idx) {
    if (idx === null || idx === undefined || toDelete.has(idx)) return;
    toDelete.add(idx);
    const c = state.jazz.chunks[idx];
    if (!c || !c.fields) return;
    const f = c.fields;
    if (c.type === 0x02eedb18) (f.allNodes || []).forEach(i => { if (i !== null) collect(i); });
    if (f.actions) f.actions.forEach(i => { if (i !== null) collect(i); });
    if (f.choices) f.choices.forEach(ch => ch.actions.forEach(i => { if (i !== null) collect(i); }));
  }
  collect(rootIdx);

  const rootChunk = state.jazz.chunks[rootIdx];
  const names = [...toDelete].map(i => `${state.jazz.chunks[i]?.typeName} #${i}`).join('<br>');
  confirmModal(
    '🗑 Delete with Children',
    `Delete the following ${toDelete.size} chunk(s)?<br><br><span style="color:var(--error)">${names}</span><br><br>This cannot be undone.`,
    `🗑 Delete ${toDelete.size} chunks`,
    () => {
      // Delete in descending index order so indices stay valid
      const sorted = [...toDelete].sort((a, b) => b - a);
      for (const idx of sorted) {
        state.jazz.chunks.splice(idx, 1);
        state.jazz.count--;
        updateAllRefsAfterDelete(idx);
        // Update remaining toDelete set indices
        for (const [old] of toDelete.entries()) {
          if (old > idx) { toDelete.delete(old); toDelete.add(old - 1); }
        }
      }
      notify(`Deleted ${sorted.length} chunks`);
      renderTree();
      renderProps();
    }
  );
}

// ─── Detach DG from State (null the ref, keep chunk) ─
function detachDGFromState(stateChunk) {
  const dgIdx = stateChunk.fields.dgIndex;
  if (dgIdx === null) return;
  confirmModal(
    '⚠ Detach Decision Graph',
    `Detach DecisionGraph #${dgIdx} from this state?<br><br>The chunk stays in the file but the state will have no decision graph.`,
    'Detach',
    () => {
      stateChunk.fields.dgIndex = null;
      stateChunk.modified = true;
      notify(`Detached DecisionGraph #${dgIdx} from state`);
      renderTree();
      renderProps();
    }
  );
}

// ─── Remove a node from DG's allNodes + graphRoot ────
function removeNodeFromDG(dgChunk, nodeIdx) {
  const f = dgChunk.fields;
  f.allNodes  = f.allNodes.filter(i => i !== nodeIdx);
  f.graphRoot = f.graphRoot.filter(i => i !== nodeIdx);
  dgChunk.modified = true;
}

// ─── Remove a state from StateMachine.states ─────────
function removeStateFromSM(smChunk, stateIdx) {
  smChunk.fields.states = smChunk.fields.states.filter(i => i !== stateIdx);
  smChunk.modified = true;
}

// ─── Remove a transition from State ──────────────────
function removeTransitionFromState(stateChunk, targetIdx) {
  stateChunk.fields.transitions = stateChunk.fields.transitions.filter(i => i !== targetIdx);
  stateChunk.modified = true;
}
